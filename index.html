    function MacroCircle({ value, goal, color, label, unit="" }) {
      const pct = Math.min((value / goal) * 100, 100);
      const over = value > goal;
      const r = 26, circ = 2 * Math.PI * r;
      return (
        <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 4 }}>
          <div style={{ position: "relative", width: 64, height: 64 }}>
            <svg width={64} height={64} viewBox="0 0 64 64">
              <circle cx={32} cy={32} r={r} fill="none" stroke={C.border} strokeWidth={5} />
              <circle cx={32} cy={32} r={r} fill="none"
                stroke={over ? C.red : color}
                strokeWidth={5}
                strokeDasharray={`${(pct/100)*circ} ${circ}`}
                strokeDashoffset={circ*0.25}
                strokeLinecap="round"
                style={{ transition: "stroke-dasharray 0.5s ease" }}
              />
            </svg>
            <div style={{ position: "absolute", inset: 0, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>
              <div style={{ fontSize: 13, fontWeight: 800, color: over ? C.red : C.text, lineHeight: 1 }}>{Math.round(value)}</div>
              <div style={{ fontSize: 12, color: C.textLight, fontWeight: 600 }}>{unit || "g"}</div>
            </div>
          </div>
          <div style={{ fontSize: 11, fontWeight: 700, color: C.textMid, textTransform: "uppercase", letterSpacing: 0.5 }}>{label}</div>
          <div style={{ fontSize: 13, color: C.textLight }}>{goal}{unit || "g"}</div>
        </div>
      );
    }

    function MacroBar({ label, value, goal, color }) {
      const pct = Math.min((value / goal) * 100, 100);
      const over = value > goal;
      const left = goal - value;
      return (
        <div style={{ marginBottom: 12 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 5 }}>
            <span style={{ fontSize: 13, fontWeight: 700, color: C.textMid }}>{label}</span>
            <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
              <span style={{ fontSize: 12, color: C.textLight }}>{Math.round(value)}g</span>
              <span style={{ fontSize: 11, color: C.textLight }}>·</span>
              <span style={{ fontSize: 12, fontWeight: 700, color: over ? C.red : C.green }}>
                {over ? `${Math.round(Math.abs(left))}g over` : `${Math.round(left)}g left`}
              </span>
            </div>
          </div>
          <div style={{ height: 7, background: C.border, borderRadius: 99, overflow: "hidden" }}>
            <div style={{ height: "100%", width: `${pct}%`, borderRadius: 99, background: over ? C.red : color, transition: "width 0.5s ease" }} />
          </div>
        </div>
      );

      const [workoutTab, setWorkoutTab] = useState("log");
      const [workouts, setWorkouts] = useState({});
      const [routines, setRoutines] = useState([]);
      const [activeWorkout, setActiveWorkout] = useState(null);
      const [workoutDate, setWorkoutDate] = useState(todayKey());
      const [showExercisePicker, setShowExercisePicker] = useState(false);
      const [exerciseSearch, setExerciseSearch] = useState("");
      const [showRoutineBuilder, setShowRoutineBuilder] = useState(false);
      const [routineDraft, setRoutineDraft] = useState({ name: "", exercises: [] });
      const [showCardioForm, setShowCardioForm] = useState(false);
      const [cardioForm, setCardioForm] = useState({ type: "Running", duration: "", distance: "", calories: "", notes: "" });
      const [editingWorkout, setEditingWorkout] = useState(null);
      const [editingCardio, setEditingCardio] = useState(null);
      const [calc, setCalc] = useState({
        sex: "male", age: "", unit: "imperial",
        heightFt: "", heightIn: "", heightCm: "",
        currentWeight: "", goalWeight: "", bodyFat: "",
        activity: "moderate", macroSplit: "balanced",
        customCarbs: "", customProtein: "", customFat: "",
      });

      useEffect(() => {
        try {
          const stored = localStorage.getItem(STORAGE_KEY);
          if (stored) {
            const d = JSON.parse(stored);
            if (d.goals) setGoals(d.goals);
            if (d.entries) setEntries(d.entries);
            if (d.workouts) setWorkouts(d.workouts);
            if (d.routines) setRoutines(d.routines);
            if (d.weightLog) setWeightLog(d.weightLog);
            if (d.bodyWeightUnit) setBodyWeightUnit(d.bodyWeightUnit);
          }
        } catch {}
      }, []);

      useEffect(() => {
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify({ goals, entries, workouts, routines, weightLog, bodyWeightUnit })); } catch {}
      }, [goals, entries, workouts, routines, weightLog, bodyWeightUnit]);

      // Load user's challenge IDs from localStorage and subscribe to each
      useEffect(() => {
        const ids = JSON.parse(localStorage.getItem("mt-challenge-ids") || "[]");
        ids.forEach(id => subscribeToChallenge(id));
        return () => Object.values(challengeListeners.current).forEach(u => u());
      }, []);

      const subscribeToChallenge = (id) => {
        if (challengeListeners.current[id]) return;
        const ref = db.ref("challenges/" + id);
        const handler = ref.on("value", snap => {
          const data = snap.val();
          if (data) setChallenges(prev => ({ ...prev, [id]: data }));
        });
        challengeListeners.current[id] = () => ref.off("value", handler);
      };

      const saveUserName = (name) => {
        setUserName(name);
        localStorage.setItem("mt-username", name);
      };

      const generateCode = () => Math.random().toString(36).substr(2, 6).toUpperCase();

      const createChallenge = async () => {
        if (!userName || !newChallenge.name) return;
        // Steps challenges don't need a goal — most steps wins
        if (newChallenge.type !== "steps" && !newChallenge.goal) return;
        const finalDuration = newChallenge.customDuration ? parseInt(newChallenge.customDuration) : newChallenge.duration;
        if (!finalDuration || finalDuration < 1) return;
        const id = generateCode();
        const challenge = {
          id, name: newChallenge.name,
          type: newChallenge.type,
          goal: newChallenge.type === "steps" ? 0 : parseFloat(newChallenge.goal),  // 0 = most wins
          unit: newChallenge.unit, duration: finalDuration,
          mostWins: newChallenge.type === "steps",  // flag: highest total wins
          createdAt: Date.now(),
          endsAt: Date.now() + finalDuration * 86400000,
          players: {
            [userName]: { name: userName, progress: 0, logs: {}, dailySteps: {} }
          }
        };
        await db.ref("challenges/" + id).set(challenge);
        const ids = JSON.parse(localStorage.getItem("mt-challenge-ids") || "[]");
        localStorage.setItem("mt-challenge-ids", JSON.stringify([...ids, id]));
        subscribeToChallenge(id);
        setActiveChallengeId(id);
        setChallengeTab("browse");
        setNewChallenge({ type:"workout", goal:"", unit:"sessions", duration:7, customDuration:"", name:"" });
        showToast("Challenge created! Code: " + id);
      };

      const joinChallenge = async () => {
        const id = joinCode.trim().toUpperCase();
        if (!id || !userName) return;
        const snap = await db.ref("challenges/" + id).get();
        if (!snap.exists()) { showToast("Challenge not found", "error"); return; }
        await db.ref("challenges/" + id + "/players/" + userName).set({ name: userName, progress: 0, logs: {} });
        const ids = JSON.parse(localStorage.getItem("mt-challenge-ids") || "[]");
        if (!ids.includes(id)) localStorage.setItem("mt-challenge-ids", JSON.stringify([...ids, id]));
        subscribeToChallenge(id);
        setJoinCode("");
        setChallengeTab("browse");
        showToast("Joined challenge!");
      };

      const logChallengeProgress = async (challengeId, amount) => {
        if (!userName) return;
        const ch = challenges[challengeId];
        if (!ch) return;
        const player = ch.players?.[userName] || { name: userName, progress: 0, logs: {} };
        const newProgress = (player.progress || 0) + amount;
        const logKey = Date.now();
        await db.ref("challenges/" + challengeId + "/players/" + userName).update({
          progress: newProgress,
          ["logs/" + logKey]: { amount, at: Date.now() }
        });
        showToast("Progress logged! 🏆");
      };

      const leaveChallenge = async (id) => {
        if (challengeListeners.current[id]) { challengeListeners.current[id](); delete challengeListeners.current[id]; }
        setChallenges(prev => { const n = {...prev}; delete n[id]; return n; });
        const ids = JSON.parse(localStorage.getItem("mt-challenge-ids") || "[]");
        localStorage.setItem("mt-challenge-ids", JSON.stringify(ids.filter(i => i !== id)));
        if (activeChallengeId === id) setActiveChallengeId(null);
      };

      // ── GOOGLE FIT ───────────────────────────────────────────────────────────
      const connectGoogleFit = () => {
        if (!window.google) { showToast("Google not loaded yet, try again", "error"); return; }
        const client = window.google.accounts.oauth2.initTokenClient({
          client_id: fitClientId,
          scope: "https://www.googleapis.com/auth/fitness.activity.read",
          callback: async (resp) => {
            if (resp.error) { showToast("Google Fit connection failed", "error"); return; }
            const token = resp.access_token;
            setFitToken(token);
            setFitConnected(true);
            localStorage.setItem("mt-fit-token", token);
            showToast("Google Fit connected! 🏃");
            fetchFitSteps(token);
          },
        });
        client.requestAccessToken();
      };

      const disconnectGoogleFit = () => {
        setFitToken("");
        setFitConnected(false);
        setFitSteps(null);
        localStorage.removeItem("mt-fit-token");
        showToast("Google Fit disconnected");
      };

      const fetchFitSteps = async (token, challengeStartMs) => {
        const t = token || fitToken;
        if (!t) return 0;
        setFitSyncing(true);
        try {
          const now = Date.now();
          // If fetching for a challenge, start from challenge start; otherwise start of today
          const startMs = challengeStartMs || (() => { const d = new Date(); d.setHours(0,0,0,0); return d.getTime(); })();
          const body = {
            aggregateBy: [{ dataTypeName: "com.google.step_count.delta" }],
            bucketByTime: { durationMillis: 86400000 },
            startTimeMillis: startMs,
            endTimeMillis: now,
          };
          const res = await fetch("https://www.googleapis.com/fitness/v1/users/me/dataset:aggregate", {
            method: "POST",
            headers: { Authorization: "Bearer " + t, "Content-Type": "application/json" },
            body: JSON.stringify(body),
          });
          if (res.status === 401) { disconnectGoogleFit(); showToast("Google Fit session expired — reconnect", "error"); return 0; }
          const data = await res.json();
          let totalSteps = 0;
          const dailyBreakdown = {};
          (data.bucket || []).forEach(b => {
            const dayKey = new Date(parseInt(b.startTimeMillis)).toISOString().split("T")[0];
            let daySteps = 0;
            (b.dataset || []).forEach(ds => {
              (ds.point || []).forEach(pt => {
                (pt.value || []).forEach(v => { daySteps += (v.intVal || 0); });
              });
            });
            if (daySteps > 0) {
              dailyBreakdown[dayKey] = daySteps;
              totalSteps += daySteps;
            }
          });
          setFitSteps(totalSteps);
          setFitSyncing(false);
          if (!challengeStartMs) showToast("Steps synced: " + totalSteps.toLocaleString() + " today");
          return { total: totalSteps, daily: dailyBreakdown };
        } catch (e) {
          showToast("Sync failed — check connection", "error");
          setFitSyncing(false);
          return 0;
        }
      };

      const syncFitStepsToChallenge = async (challengeId) => {
        const ch = challenges[challengeId];
        if (!ch) { showToast("Challenge not found", "error"); return; }
        if (!fitToken) { connectGoogleFit(); return; }
        setFitSyncing(true);
        console.log("Syncing challenge:", challengeId, "createdAt:", ch.createdAt, "userName:", userName);
        // Find the exact player key in Firebase (handles case/space mismatches)
        const existingPlayers = Object.keys(ch.players || {});
        const matchedKey = existingPlayers.find(k => k.toLowerCase() === userName.toLowerCase()) || userName;
        console.log("Using player key:", matchedKey, "existing players:", existingPlayers);
        try {
          const now = Date.now();
          const body = {
            aggregateBy: [{ dataTypeName: "com.google.step_count.delta" }],
            bucketByTime: { durationMillis: 86400000 },
            startTimeMillis: ch.createdAt,
            endTimeMillis: now,
          };
          console.log("Fetching Fit data from", new Date(ch.createdAt).toLocaleDateString(), "to now");
          const res = await fetch("https://www.googleapis.com/fitness/v1/users/me/dataset:aggregate", {
            method: "POST",
            headers: { Authorization: "Bearer " + fitToken, "Content-Type": "application/json" },
            body: JSON.stringify(body),
          });
          console.log("Fit API status:", res.status);
          if (res.status === 401) {
            disconnectGoogleFit();
            showToast("Google Fit session expired — reconnect", "error");
            setFitSyncing(false);
            return;
          }
          const data = await res.json();
          console.log("Fit API response:", JSON.stringify(data).slice(0, 500));
          let totalSteps = 0;
          const dailyBreakdown = {};
          (data.bucket || []).forEach(b => {
            const dayKey = new Date(parseInt(b.startTimeMillis)).toISOString().split("T")[0];
            let daySteps = 0;
            (b.dataset || []).forEach(ds => {
              (ds.point || []).forEach(pt => {
                (pt.value || []).forEach(v => { daySteps += (v.intVal || 0); });
              });
            });
            if (daySteps > 0) {
              dailyBreakdown[dayKey] = daySteps;
              totalSteps += daySteps;
            }
          });
          console.log("Total steps calculated:", totalSteps, "daily:", dailyBreakdown);
          const writeRef = "challenges/" + challengeId + "/players/" + matchedKey;
          console.log("Writing to Firebase:", writeRef, "progress:", totalSteps);
          // Write each field separately for reliability
          await db.ref(writeRef + "/progress").set(totalSteps);
          await db.ref(writeRef + "/lastSynced").set(Date.now());
          if (Object.keys(dailyBreakdown).length > 0) {
            await db.ref(writeRef + "/dailySteps").set(dailyBreakdown);
          }
          console.log("Firebase write complete");
          // Also update local state immediately so UI reflects new value right away
          setChallenges(prev => ({
            ...prev,
            [challengeId]: {
              ...prev[challengeId],
              players: {
                ...prev[challengeId]?.players,
                [matchedKey]: {
                  ...prev[challengeId]?.players?.[matchedKey],
                  progress: totalSteps,
                  dailySteps: dailyBreakdown,
                  lastSynced: Date.now(),
                }
              }
            }
          }));
          setFitSteps(totalSteps);
          showToast("Synced " + totalSteps.toLocaleString() + " steps! 🏃");
        } catch (e) {
          console.error("Sync error:", e);
          showToast("Sync failed — try reconnecting Google Fit", "error");
        }
        setFitSyncing(false);
      };

      const showToast = (msg, type="success") => {
        setToast({ msg, type });
        setTimeout(() => setToast(null), 2200);
      };

      const dayEntries = entries[selectedDate] || [];
      const totals = dayEntries.reduce(
        (acc, e) => ({ calories: acc.calories + e.calories * e.qty, protein: acc.protein + e.protein * e.qty, carbs: acc.carbs + e.carbs * e.qty, fat: acc.fat + e.fat * e.qty }),
        { calories: 0, protein: 0, carbs: 0, fat: 0 }
      );

      const addEntry = () => {
        let cal, pro, carb, fat, entryName;
        if (weightMode) {
          if (!form.name || !weightAmount || !per100.calories) return;
          const grams = weightUnit === "oz" ? parseFloat(weightAmount) * 28.3495 : parseFloat(weightAmount);
          const ratio = grams / 100;
          cal = (parseFloat(per100.calories)||0) * ratio;
          pro = (parseFloat(per100.protein)||0) * ratio;
          carb = (parseFloat(per100.carbs)||0) * ratio;
          fat = (parseFloat(per100.fat)||0) * ratio;
          entryName = `${form.name} (${parseFloat(weightAmount)}${weightUnit})`;
        } else {
          if (!form.name || !form.calories) return;
          cal = parseFloat(form.calories)||0;
          pro = parseFloat(form.protein)||0;
          carb = parseFloat(form.carbs)||0;
          fat = parseFloat(form.fat)||0;
          entryName = form.name;
        }
        const entry = { id: Date.now(), name: entryName, calories: cal, protein: pro, carbs: carb, fat, meal: form.meal, qty: weightMode ? 1 : (parseFloat(form.qty)||1) };
        setEntries(prev => ({ ...prev, [selectedDate]: [...(prev[selectedDate]||[]), entry] }));
        setForm({ name: "", calories: "", protein: "", carbs: "", fat: "", meal: form.meal, qty: 1 });
        setPer100({ calories: "", protein: "", carbs: "", fat: "" });
        setWeightAmount("");
        setSearchQuery("");
        setShowPresets(false);
        showToast(`Added ${entryName}`);
        setTab("log");
      };

      const removeEntry = (id) => setEntries(prev => ({ ...prev, [selectedDate]: (prev[selectedDate]||[]).filter(e => e.id !== id) }));

      const selectPreset = (p) => {
        if (weightMode) {
          setForm(f => ({ ...f, name: p.name }));
          setPer100({ calories: p.calories, protein: p.protein, carbs: p.carbs, fat: p.fat });
        } else {
          setForm(f => ({ ...f, name: p.name, calories: p.calories, protein: p.protein, carbs: p.carbs, fat: p.fat }));
        }
        setShowPresets(false);
        setSearchQuery("");
      };

      const saveGoals = () => { setGoals(goalDraft); setEditGoals(false); showToast("Goals saved!"); };

      const mealGroups = MEAL_TYPES.map(m => ({ meal: m, items: dayEntries.filter(e => e.meal === m) })).filter(g => g.items.length > 0);
      const filtered = PRESET_FOODS.filter(p => p.name.toLowerCase().includes(searchQuery.toLowerCase()));
      const caloriesLeft = goals.calories - totals.calories;
      const calPct = Math.min((totals.calories / goals.calories) * 100, 100);
      const isToday = selectedDate === todayKey();

      const formatDate = (d) => {
        const date = new Date(d + "T12:00:00");
        if (d === todayKey()) return "Today";
        return date.toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric" });
      };

      return (
        <div style={{ minHeight: "100vh", background: C.bg, display: "flex", flexDirection: "column", maxWidth: 480, margin: "0 auto", paddingBottom: 80 }}>

          {/* Toast */}
          {toast && (
            <div style={{ position: "fixed", top: 16, left: "50%", transform: "translateX(-50%)", background: toast.type === "success" ? C.green : C.red, color: "#fff", padding: "10px 20px", borderRadius: 99, fontSize: 13, fontWeight: 700, zIndex: 999, whiteSpace: "nowrap", boxShadow: "0 4px 20px rgba(0,0,0,0.15)", animation: "slideDown 0.2s ease" }}>
              ✓ {toast.msg}
            </div>
          )}

          {/* Header */}
          <div style={{ background: C.blue, padding: "20px 20px 0" }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: tab === "dash" ? 16 : 12 }}>
              <div>
                <div style={{ fontSize: 13, color: "rgba(255,255,255,0.65)", fontWeight: 700, letterSpacing: 1, textTransform: "uppercase", marginBottom: 1 }}>Macro Tracker</div>
                <div style={{ fontSize: 23, fontWeight: 900, color: "#fff" }}>{formatDate(selectedDate)}</div>
              </div>
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                {tab !== "dash" && (
                  <div style={{ textAlign: "right" }}>
                    <div style={{ fontSize: 13, color: "rgba(255,255,255,0.65)", fontWeight: 700 }}>{caloriesLeft >= 0 ? "remaining" : "over"}</div>
                    <div style={{ fontSize: 23, fontWeight: 900, color: caloriesLeft < 0 ? "#ffcdd2" : "#fff" }}>{Math.abs(Math.round(caloriesLeft))} cal</div>
                  </div>
                )}
                <input type="date" value={selectedDate} onChange={e => setSelectedDate(e.target.value)}
                  style={{ background: "rgba(255,255,255,0.15)", border: "1.5px solid rgba(255,255,255,0.3)", color: "#fff", borderRadius: 10, padding: "7px 10px", fontSize: 12, cursor: "pointer", fontFamily: "inherit", fontWeight: 600 }} />
              </div>
            </div>

            {/* Dashboard header expansion */}
            {tab === "dash" && (
              <div style={{ background: "rgba(255,255,255,0.12)", borderRadius: "16px 16px 0 0", padding: "16px 20px 0" }}>
                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 12 }}>
                  <div>
                    <div style={{ fontSize: 13, color: "rgba(255,255,255,0.65)", fontWeight: 700, textTransform: "uppercase", letterSpacing: 0.5 }}>Calories Today</div>
                    <div style={{ display: "flex", alignItems: "baseline", gap: 5 }}>
                      <span style={{ fontSize: 42, fontWeight: 900, color: "#fff", lineHeight: 1 }}>{Math.round(totals.calories)}</span>
                      <span style={{ fontSize: 13, color: "rgba(255,255,255,0.55)", fontWeight: 600 }}>/ {goals.calories}</span>
                    </div>
                  </div>
                  <div style={{ textAlign: "right" }}>
                    <div style={{ fontSize: 13, color: "rgba(255,255,255,0.65)", fontWeight: 700, textTransform: "uppercase", letterSpacing: 0.5 }}>{caloriesLeft >= 0 ? "Remaining" : "Over"}</div>
                    <div style={{ fontSize: 29, fontWeight: 900, color: caloriesLeft < 0 ? "#ffcdd2" : "#fff", lineHeight: 1.1 }}>{Math.abs(Math.round(caloriesLeft))}</div>
                  </div>
                </div>
                <div style={{ height: 5, background: "rgba(255,255,255,0.2)", borderRadius: 99, overflow: "hidden", marginBottom: 16 }}>
                  <div style={{ height: "100%", width: `${calPct}%`, background: caloriesLeft < 0 ? "#ffcdd2" : "rgba(255,255,255,0.9)", borderRadius: 99, transition: "width 0.5s ease" }} />
                </div>
                <div style={{ display: "flex", justifyContent: "space-around", paddingBottom: 14 }}>
                  <MacroCircle value={totals.protein} goal={goals.protein} color="#fff" label="Protein" />
                  <MacroCircle value={totals.carbs} goal={goals.carbs} color="#fff" label="Carbs" />
                  <MacroCircle value={totals.fat} goal={goals.fat} color="#fff" label="Fat" />
                </div>
              </div>
            )}
          </div>

          {/* Tab bar */}
          <div style={{ background: C.card, borderBottom: `1px solid ${C.border}`, display: "flex", padding: "0 4px" }}>
            {[["dash", "🏠", "Home"], ["log", "📋", "Log"], ["add", "➕", "Add"], ["workout", "💪", "Train"], ["challenge", "🏆", "Compete"], ["goals", "🎯", "Goals"]].map(([t, icon, label]) => (
              <button key={t} onClick={() => setTab(t)} style={{
                flex: 1, padding: "11px 2px", background: "none", border: "none",
                borderBottom: tab === t ? `3px solid ${C.blue}` : "3px solid transparent",
                color: tab === t ? C.blue : C.textLight,
                fontWeight: 800, fontSize: 13, cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", gap: 2, transition: "color 0.2s", fontFamily: "inherit"
              }}>
                <span style={{ fontSize: 15 }}>{icon}</span>
                {label}
              </button>
            ))}
          </div>

          {/* Content */}
          <div style={{ flex: 1, padding: "16px 16px 20px" }}>

            {/* DASHBOARD TAB */}
            {tab === "dash" && (() => {
              const last7 = Array.from({length:7},(_,i)=>{ const d=new Date(); d.setDate(d.getDate()-i); return dateKey(d); }).reverse();
              const last30 = Array.from({length:30},(_,i)=>{ const d=new Date(); d.setDate(d.getDate()-i); return dateKey(d); }).reverse();

              // Nutrition stats
              const weekCalAvg = (() => {
                const days = last7.filter(d => (entries[d]||[]).length > 0);
                if (!days.length) return 0;
                return Math.round(days.reduce((a,d) => a + (entries[d]||[]).reduce((s,e)=>s+e.calories*e.qty,0), 0) / days.length);
              })();
              const weekProtAvg = (() => {
                const days = last7.filter(d => (entries[d]||[]).length > 0);
                if (!days.length) return 0;
                return Math.round(days.reduce((a,d) => a + (entries[d]||[]).reduce((s,e)=>s+e.protein*e.qty,0), 0) / days.length);
              })();
              const daysLogged = last7.filter(d => (entries[d]||[]).length > 0).length;
              const daysWorkedOut = last7.filter(d => (workouts[d]||[]).length > 0).length;

              // Weight stats
              const weightEntries = Object.entries(weightLog).filter(([,v])=>v).sort(([a],[b])=>a.localeCompare(b));
              const latestWeight = weightEntries.length ? weightEntries[weightEntries.length-1][1] : null;
              const firstWeight = weightEntries.length ? weightEntries[0][1] : null;
              const weightChange = latestWeight && firstWeight ? (parseFloat(latestWeight) - parseFloat(firstWeight)).toFixed(1) : null;

              // Workout stats
              const totalWorkouts = Object.values(workouts).flat().length;
              const totalSets = Object.values(workouts).flat().filter(w=>w.type==="workout"||w.type==="lifting").reduce((a,w)=>a+(w.exercises||[]).filter(e=>!e.isCardio).reduce((b,e)=>b+e.sets.filter(s=>s.done).length,0),0);

              // Log weight
              const logWeight = () => {
                if (!weightEntry) return;
                setWeightLog(prev => ({ ...prev, [selectedDate]: weightEntry }));
                setWeightEntry("");
                showToast("Weight logged!");
              };

              // Mini sparkline for weight
              const recentWeights = last30.map(d => ({ date: d, val: weightLog[d] ? parseFloat(weightLog[d]) : null })).filter(x => x.val);
              const minW = recentWeights.length ? Math.min(...recentWeights.map(x=>x.val)) - 2 : 0;
              const maxW = recentWeights.length ? Math.max(...recentWeights.map(x=>x.val)) + 2 : 1;

              // Calorie bar chart last 7 days
              const maxCal = Math.max(...last7.map(d => (entries[d]||[]).reduce((s,e)=>s+e.calories*e.qty,0)), goals.calories);

              return (
                <div style={{ animation: "fadeIn 0.2s ease" }}>

                  {/* Quick action buttons */}
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8, marginBottom: 16 }}>
                    {[["➕","Log Food","add"],["💪","Workout","workout"],["🎯","Goals","goals"]].map(([icon,label,t]) => (
                      <button key={t} onClick={() => setTab(t)} style={{ padding: "12px 6px", borderRadius: 14, border: `1.5px solid ${C.border}`, background: C.card, fontWeight: 800, fontSize: 12, color: C.textMid, cursor: "pointer", fontFamily: "inherit", display: "flex", flexDirection: "column", alignItems: "center", gap: 4, boxShadow: "0 1px 4px rgba(0,0,0,0.04)" }}>
                        <span style={{ fontSize: 23 }}>{icon}</span>{label}
                      </button>
                    ))}
                  </div>

                                <span><span style={{fontWeight:700}}>{ex.name}</span>{ex.sets.filter(s=>s.done&&s.weight&&s.reps).map((s,si) => <span key={si} style={{color:C.textLight}}> {s.weight}×{s.reps}</span>)}</span>

                          <label style={{fontSize:14, color:C.textMid, fontWeight:700, display:"block", marginBottom:6}}>Routine Name</label>
                          <input placeholder="e.g. Push Day, Leg Day..." value={routineDraft.name} onChange={e => setRoutineDraft(d => ({...d,name:e.target.value}))} style={{...inputS, width:"100%", marginBottom:12}} />
                          <label style={{fontSize:14, color:C.textMid, fontWeight:700, display:"block", marginBottom:8}}>Exercises</label>
                          {routineDraft.exercises.map((e,i) => (
                            <div key={i} style={{display:"flex", alignItems:"center", gap:8, marginBottom:6}}>
                              <div style={{flex:1, padding:"9px 12px", borderRadius:10, background:C.bg, border:"1px solid "+C.border, fontSize:15, fontWeight:700, color:C.text}}>{e}</div>
                              <button onClick={() => setRoutineDraft(d => ({...d,exercises:d.exercises.filter((_,j)=>j!==i)}))} style={{background:C.border, border:"none", color:C.textLight, width:28, height:28, borderRadius:8, fontSize:16, cursor:"pointer", fontFamily:"inherit"}}>×</button>
                            </div>
                          ))}
                          <input placeholder="Search & add exercise..." value={exerciseSearch} onChange={e => setExerciseSearch(e.target.value)} style={{...inputS, width:"100%", marginTop:8, marginBottom:8}} />
                          {exerciseSearch && (
                            <div style={{maxHeight:180, overflowY:"auto", border:"1px solid "+C.border, borderRadius:10, overflow:"hidden"}}>
                              {allExercises.filter(e => e.toLowerCase().includes(exerciseSearch.toLowerCase()) && !routineDraft.exercises.includes(e)).slice(0,8).map(e => (
                                <button key={e} onClick={() => { setRoutineDraft(d => ({...d,exercises:[...d.exercises,e]})); setExerciseSearch(""); }}
                                  style={{display:"block", width:"100%", textAlign:"left", padding:"10px 12px", background:C.bg, border:"none", borderBottom:"1px solid "+C.border, color:C.text, fontWeight:700, fontSize:15, cursor:"pointer", fontFamily:"inherit"}}>
                                  {e}
                                </button>
                              ))}
                            </div>
                          )}
                          <div style={{display:"flex", gap:8, marginTop:12}}>
                            <button onClick={() => { setShowRoutineBuilder(false); setRoutineDraft({name:"",exercises:[]}); setExerciseSearch(""); }}
                              style={{flex:1, padding:"12px", borderRadius:12, border:"1.5px solid "+C.border, background:C.bg, color:C.textMid, fontWeight:800, cursor:"pointer", fontFamily:"inherit"}}>Cancel</button>
                            <button onClick={saveRoutine} style={{flex:2, padding:"12px", borderRadius:12, border:"none", background:C.blue, color:"#fff", fontWeight:800, fontSize:16, cursor:"pointer", fontFamily:"inherit"}}>Save Routine</button>
                          </div>
                        </div>
                      )}
                    </div>
                  )}

                  {workoutTab === "prs" && (
                    <div>
                      <div style={{fontSize:15, fontWeight:800, color:C.textMid, textTransform:"uppercase", letterSpacing:0.5, marginBottom:14}}>Personal Records</div>
                      {Object.keys(prs).length===0 ? (
                        <div style={{textAlign:"center", padding:"50px 20px", color:C.textLight}}>
                          <div style={{fontSize:48, marginBottom:12}}>🏆</div>
                          <div style={{fontSize:18, fontWeight:800, color:C.textMid, marginBottom:6}}>No PRs yet</div>
                          <div style={{fontSize:15}}>Log workouts and your PRs appear here automatically</div>
                        </div>
                      ) : Object.entries(EXERCISES).map(([group,exs]) => {
                          const gPRs = exs.filter(e => prs[e]);
                          if (!gPRs.length) return null;
                          return (
                            <div key={group} style={{marginBottom:16}}>
                              <div style={{fontSize:14, fontWeight:800, color:C.textLight, textTransform:"uppercase", letterSpacing:1, marginBottom:8}}>{group}</div>
                              {gPRs.map(e => {
                                const pr = prs[e];
                                return (
                                  <div key={e} style={{background:C.card, borderRadius:14, border:"1px solid "+C.border, padding:"12px 16px", marginBottom:8, display:"flex", alignItems:"center", justifyContent:"space-between"}}>
                                    <div>
                                      <div style={{fontSize:16, fontWeight:800, color:C.text}}>{e}</div>
                                      <div style={{fontSize:13, color:C.textLight, fontWeight:600}}>{new Date(pr.date+"T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})}</div>
                                    </div>
                                    <div style={{textAlign:"right"}}>
                                      <div style={{fontSize:20, fontWeight:900, color:C.orange}}>{pr.weight}<span style={{fontSize:13, fontWeight:600, color:C.textLight}}>lb</span></div>
                                      <div style={{fontSize:14, color:C.textMid, fontWeight:700}}>× {pr.reps} reps</div>
                                    </div>
                                  </div>
                                );
                              })}
                            </div>
                          );
                        })
                      }
                    </div>
                  )}
                </div>
              );
            })()}


            {/* CHALLENGES TAB */}
            {tab === "challenge" && (() => {
              const myChallenges = Object.values(challenges);
              const now = Date.now();
              const TYPES = [
                { id:"workout", label:"Workout Sessions", icon:"🏋️", units:["sessions"] },
                { id:"running", label:"Running Distance", icon:"🏃", units:["miles","km"] },
                { id:"steps",   label:"Step Count",       icon:"👟", units:["steps"] },
              ];

              // Username gate
              if (!userName) return (
                <div style={{animation:"fadeIn 0.2s ease", textAlign:"center", padding:"40px 20px"}}>
                  <div style={{fontSize:52, marginBottom:16}}>🏆</div>
                  <div style={{fontSize:22, fontWeight:900, color:C.text, marginBottom:8}}>Head-to-Head Challenges</div>
                  <div style={{fontSize:16, color:C.textLight, marginBottom:28}}>Set a display name to get started</div>
                  <input placeholder="Your name (e.g. JP)" id="unameInput"
                    style={{...inputStyle, marginBottom:12, textAlign:"center", fontSize:18, fontWeight:700}}
                    onKeyDown={e => { if (e.key==="Enter" && e.target.value.trim()) saveUserName(e.target.value.trim()); }} />
                  <button onClick={() => { const v=document.getElementById("unameInput").value.trim(); if(v) saveUserName(v); }}
                    style={{width:"100%", padding:"14px", borderRadius:14, border:"none", background:C.blue, color:"#fff", fontWeight:800, fontSize:18, cursor:"pointer", fontFamily:"inherit"}}>
                    Let's Go →
                  </button>
                </div>
              );

              return (
                <div style={{animation:"fadeIn 0.2s ease"}}>
                  {/* Sub-tabs */}
                  <div style={{display:"flex", background:C.border, borderRadius:12, padding:3, marginBottom:16}}>
                    {[["browse","🏆 My Challenges"],["create","➕ Create"],["join","🔗 Join"]].map(([t,label]) => (
                      <button key={t} onClick={() => setChallengeTab(t)}
                        style={{flex:1, padding:"8px 4px", borderRadius:10, fontSize:13, fontWeight:800, border:"none", cursor:"pointer", fontFamily:"inherit",
                          background:challengeTab===t?C.card:"transparent", color:challengeTab===t?C.blue:C.textLight,
                          boxShadow:challengeTab===t?"0 2px 8px rgba(0,0,0,0.1)":"none"}}>
                        {label}
                      </button>
                    ))}
                  </div>

                  {/* BROWSE */}
                  {challengeTab === "browse" && (
                    <div>
                      <div style={{fontSize:14, color:C.textLight, fontWeight:700, marginBottom:12}}>
                        Playing as <span style={{color:C.blue, fontWeight:800}}>{userName}</span>
                        <button onClick={() => saveUserName("")} style={{marginLeft:8, fontSize:13, color:C.textLight, background:"none", border:"none", cursor:"pointer", fontFamily:"inherit", textDecoration:"underline"}}>change</button>
                      </div>

                      {/* Google Fit connection status */}
                      <div style={{background:fitConnected?C.greenLight:C.bg, borderRadius:14, border:`1px solid ${fitConnected?C.green:C.border}`, padding:"12px 16px", marginBottom:14, display:"flex", alignItems:"center", justifyContent:"space-between"}}>
                        <div>
                          <div style={{fontSize:14, fontWeight:800, color:fitConnected?C.green:C.textMid}}>
                            {fitConnected ? "✅ Google Fit Connected" : "📱 Google Fit Not Connected"}
                          </div>
                          <div style={{fontSize:13, color:C.textLight, marginTop:2}}>
                            {fitConnected
                              ? (fitSteps !== null ? fitSteps.toLocaleString() + " steps today from Garmin" : "Tap sync to load today's steps")
                              : "Connect to auto-sync Garmin steps"}
                          </div>
                        </div>
                        {fitConnected ? (
                          <div style={{display:"flex", gap:6}}>
                            <button onClick={() => fetchFitSteps()}
                              style={{padding:"7px 12px", borderRadius:10, border:"none", background:C.green, color:"#fff", fontWeight:800, fontSize:14, cursor:"pointer", fontFamily:"inherit"}}>
                              {fitSyncing ? "..." : "↻"}
                            </button>
                            <button onClick={disconnectGoogleFit}
                              style={{padding:"7px 10px", borderRadius:10, border:`1px solid ${C.border}`, background:C.card, color:C.textLight, fontWeight:700, fontSize:13, cursor:"pointer", fontFamily:"inherit"}}>
                              Disconnect
                            </button>
                          </div>
                        ) : (
                          <button onClick={connectGoogleFit}
                            style={{padding:"9px 14px", borderRadius:10, border:"none", background:C.blue, color:"#fff", fontWeight:800, fontSize:14, cursor:"pointer", fontFamily:"inherit"}}>
                            Connect
                          </button>
                        )}
                      </div>
                      {myChallenges.length === 0 ? (
                        <div style={{textAlign:"center", padding:"40px 20px", color:C.textLight}}>
                          <div style={{fontSize:48, marginBottom:12}}>🥊</div>
                          <div style={{fontSize:18, fontWeight:800, color:C.textMid, marginBottom:8}}>No active challenges</div>
                          <div style={{fontSize:15, marginBottom:24}}>Create one or join with a code</div>
                          <div style={{display:"flex", gap:8}}>
                            <button onClick={() => setChallengeTab("create")} style={{flex:1, padding:"12px", borderRadius:12, border:"none", background:C.blue, color:"#fff", fontWeight:800, fontSize:16, cursor:"pointer", fontFamily:"inherit"}}>Create</button>
                            <button onClick={() => setChallengeTab("join")} style={{flex:1, padding:"12px", borderRadius:12, border:`1.5px solid ${C.border}`, background:C.card, color:C.textMid, fontWeight:800, fontSize:16, cursor:"pointer", fontFamily:"inherit"}}>Join</button>
                          </div>
                        </div>
                      ) : myChallenges.map(ch => {
                        const players = Object.values(ch.players || {}).sort((a,b) => (b.progress||0)-(a.progress||0));
                        const me = ch.players?.[userName];
                        const myProgress = me?.progress || 0;
                        const opponent = players.find(p => p.name !== userName);
                        const oppProgress = opponent?.progress || 0;
                        const isMostWins = ch.mostWins || ch.type === "steps";
                        // For most-wins: bar shows % of combined total or vs each other
                        const maxProgress = Math.max(myProgress, oppProgress, 1);
                        const pct = isMostWins ? Math.min((myProgress / maxProgress) * 100, 100) : Math.min((myProgress / ch.goal) * 100, 100);
                        const oppPct = isMostWins ? Math.min((oppProgress / maxProgress) * 100, 100) : Math.min((oppProgress / ch.goal) * 100, 100);
                        const daysLeft = Math.max(0, Math.ceil((ch.endsAt - now) / 86400000));
                        const ended = now > ch.endsAt;
                        const typeInfo = TYPES.find(t => t.id === ch.type) || TYPES[0];
                        const winner = ended ? (myProgress > oppProgress ? "you" : myProgress < oppProgress ? "them" : "tie") : null;
                        // Leading indicator for active challenges
                        const leading = !ended && opponent ? (myProgress > oppProgress ? "you" : myProgress < oppProgress ? "them" : "tied") : null;
                        return (
                          <div key={ch.id} style={{background:C.card, borderRadius:16, border:`1px solid ${C.border}`, padding:16, marginBottom:14, boxShadow:"0 1px 4px rgba(0,0,0,0.05)"}}>
                            {/* Header */}
                            <div style={{display:"flex", alignItems:"flex-start", justifyContent:"space-between", marginBottom:12}}>
                              <div>
                                <div style={{fontSize:18, fontWeight:900, color:C.text}}>{typeInfo.icon} {ch.name}</div>
                                <div style={{fontSize:13, color:C.textLight, fontWeight:600, marginTop:2}}>
                                  {isMostWins ? "Most steps wins" : `Goal: ${ch.goal} ${ch.unit}`} · {ended ? "Ended" : daysLeft+" day"+( daysLeft!==1?"s":"")+` left`} · Code: <span style={{fontWeight:800, color:C.blue, letterSpacing:1}}>{ch.id}</span>
                                </div>
                              </div>
                              <div style={{display:"flex", flexDirection:"column", alignItems:"flex-end", gap:4}}>
                                {ended && winner && (
                                  <div style={{fontSize:13, fontWeight:800, padding:"4px 10px", borderRadius:99,
                                    background: winner==="you" ? C.green : winner==="tie" ? C.orange : C.red, color:"#fff"}}>
                                    {winner==="you" ? "🏆 Won!" : winner==="tie" ? "🤝 Tie" : "😤 Lost"}
                                  </div>
                                )}
                                {leading && (
                                  <div style={{fontSize:11, fontWeight:800, padding:"3px 8px", borderRadius:99,
                                    background: leading==="you" ? C.greenLight : leading==="tied" ? C.orangeLight||"#fff3e0" : C.redLight||"#fdecea",
                                    color: leading==="you" ? C.green : leading==="tied" ? C.orange : C.red}}>
                                    {leading==="you" ? "🔥 You're leading" : leading==="tied" ? "⚡ Tied" : "😤 Behind"}
                                  </div>
                                )}
                              </div>
                            </div>

                            {/* VS bars */}
                            <div style={{marginBottom:14}}>
                              {/* Me */}
                              <div style={{marginBottom:8}}>
                                <div style={{display:"flex", justifyContent:"space-between", marginBottom:4}}>
                                  <span style={{fontSize:15, fontWeight:800, color:C.blue}}>{userName} (you)</span>
                                  <span style={{fontSize:15, fontWeight:800, color:C.blue}}>
                                    {isMostWins ? myProgress.toLocaleString() + " steps" : myProgress + " / " + ch.goal + " " + ch.unit}
                                  </span>
                                </div>
                                <div style={{height:10, background:C.border, borderRadius:99, overflow:"hidden"}}>
                                  <div style={{height:"100%", width:`${pct}%`, background:C.blue, borderRadius:99, transition:"width 0.5s ease"}} />
                                </div>
                                {isMostWins && me?.lastSynced && (
                                  <div style={{fontSize:11, color:C.textLight, marginTop:3}}>
                                    Last synced {new Date(me.lastSynced).toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"})}
                                  </div>
                                )}
                              </div>
                              {/* VS divider */}
                              <div style={{textAlign:"center", fontSize:13, fontWeight:800, color:C.textLight, marginBottom:8}}>VS</div>
                              {/* Opponent */}
                              {opponent ? (
                                <div>
                                  <div style={{display:"flex", justifyContent:"space-between", marginBottom:4}}>
                                    <span style={{fontSize:15, fontWeight:800, color:C.orange}}>{opponent.name}</span>
                                    <span style={{fontSize:15, fontWeight:800, color:C.orange}}>
                                      {isMostWins ? oppProgress.toLocaleString() + " steps" : oppProgress + " / " + ch.goal + " " + ch.unit}
                                    </span>
                                  </div>
                                  <div style={{height:10, background:C.border, borderRadius:99, overflow:"hidden"}}>
                                    <div style={{height:"100%", width:`${oppPct}%`, background:C.orange, borderRadius:99, transition:"width 0.5s ease"}} />
                                  </div>
                                  {isMostWins && opponent?.lastSynced && (
                                    <div style={{fontSize:11, color:C.textLight, marginTop:3}}>
                                      Last synced {new Date(opponent.lastSynced).toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"})}
                                    </div>
                                  )}
                                </div>
                              ) : (
                                <div style={{textAlign:"center", padding:"10px", background:C.bg, borderRadius:10, fontSize:14, color:C.textLight}}>
                                  Waiting for opponent · Share code <span style={{fontWeight:800, color:C.blue}}>{ch.id}</span>
                                </div>
                              )}
                            </div>

                            {/* Log Progress */}
                            {!ended && (
                              <div>
                                <div style={{fontSize:14, fontWeight:800, color:C.textMid, marginBottom:8}}>Log Progress</div>
                                <div style={{display:"flex", gap:8}}>
                                  {ch.type === "workout" && (
                                    <button onClick={() => logChallengeProgress(ch.id, 1)}
                                      style={{flex:1, padding:"11px", borderRadius:12, border:"none", background:C.blue, color:"#fff", fontWeight:800, fontSize:15, cursor:"pointer", fontFamily:"inherit"}}>
                                      + 1 Workout Session
                                    </button>
                                  )}
                                  {ch.type === "running" && (() => {
                                    const rKey = "run-"+ch.id;
                                    return (
                                      <div style={{display:"flex", gap:8, flex:1}}>
                                        <input type="number" placeholder={"Miles run"} id={rKey}
                                          style={{...inputStyle, flex:1, padding:"10px 12px"}} />
                                        <button onClick={() => { const v=parseFloat(document.getElementById(rKey)?.value||0); if(v>0){logChallengeProgress(ch.id,v);document.getElementById(rKey).value="";} }}
                                          style={{padding:"11px 16px", borderRadius:12, border:"none", background:C.green, color:"#fff", fontWeight:800, fontSize:15, cursor:"pointer", fontFamily:"inherit"}}>
                                          Log
                                        </button>
                                      </div>
                                    );
                                  })()}
                                  {ch.type === "steps" && (() => {
                                    const sKey = "steps-"+ch.id;
                                    const myLastSync = ch.players?.[userName]?.lastSynced;
                                    return (
                                      <div style={{display:"flex", flexDirection:"column", gap:8}}>
                                        {fitConnected ? (
                                          <div>
                                            <div style={{background:C.greenLight, borderRadius:12, padding:"12px 14px", marginBottom:8}}>
                                              <div style={{fontSize:13, fontWeight:800, color:C.green, marginBottom:2}}>🔗 Garmin → Google Fit → Challenge</div>
                                              <div style={{fontSize:13, color:C.textMid, fontWeight:600}}>Syncs your total steps since the challenge started — whoever has most wins</div>
                                              {myLastSync && <div style={{fontSize:12, color:C.textLight, marginTop:4}}>Last synced: {new Date(myLastSync).toLocaleString("en-US",{month:"short",day:"numeric",hour:"numeric",minute:"2-digit"})}</div>}
                                            </div>
                                            <button onClick={() => syncFitStepsToChallenge(ch.id)}
                                              style={{width:"100%", padding:"13px", borderRadius:12, border:"none", background:fitSyncing?C.border:C.green, color:"#fff", fontWeight:800, fontSize:15, cursor:"pointer", fontFamily:"inherit"}}>
                                              {fitSyncing ? "⏳ Syncing from Garmin..." : "↻ Sync Steps from Garmin"}
                                            </button>
                                          </div>
                                        ) : (
                                          <div>
                                            <div style={{background:C.blueLight, borderRadius:10, padding:"10px 14px", marginBottom:8, fontSize:13, color:C.blue, fontWeight:700}}>
                                              🔗 Connect Google Fit to auto-sync Garmin steps
                                            </div>
                                            <button onClick={connectGoogleFit}
                                              style={{width:"100%", padding:"11px", borderRadius:12, border:"none", background:C.blue, color:"#fff", fontWeight:800, fontSize:14, cursor:"pointer", fontFamily:"inherit", marginBottom:8}}>
                                              Connect Google Fit
                                            </button>
                                            <div style={{display:"flex", gap:8}}>
                                              <input type="number" placeholder="Or enter steps manually" id={sKey}
                                                style={{...inputStyle, flex:1, padding:"10px 12px"}} />
                                              <button onClick={() => { const v=parseFloat(document.getElementById(sKey)?.value||0); if(v>0){logChallengeProgress(ch.id,v);document.getElementById(sKey).value="";} }}
                                                style={{padding:"11px 16px", borderRadius:12, border:"none", background:C.purple, color:"#fff", fontWeight:800, fontSize:14, cursor:"pointer", fontFamily:"inherit"}}>
                                                Log
                                              </button>
                                            </div>
                                          </div>
                                        )}
                                      </div>
                                    );
                                  })()}
                                </div>
                              </div>
                            )}

                            {/* Leave */}
                            <button onClick={() => leaveChallenge(ch.id)}
                              style={{width:"100%", marginTop:10, padding:"8px", borderRadius:10, border:`1px solid ${C.border}`, background:"transparent", color:C.textLight, fontWeight:700, fontSize:14, cursor:"pointer", fontFamily:"inherit"}}>
                              Leave Challenge
                            </button>
                          </div>
                        );
                      })}
                    </div>
                  )}

                  {/* CREATE */}
                  {challengeTab === "create" && (
                    <div>
                      <div style={{background:C.card, borderRadius:16, border:`1px solid ${C.border}`, padding:16}}>
                        <div style={{fontSize:17, fontWeight:800, color:C.text, marginBottom:16}}>Create a Challenge</div>

                        <label style={{fontSize:14, color:C.textMid, fontWeight:700, display:"block", marginBottom:6}}>Challenge Name</label>
                        <input placeholder="e.g. Week 1 Grind" value={newChallenge.name}
                          onChange={e => setNewChallenge(n => ({...n, name:e.target.value}))}
                          style={{...inputStyle, marginBottom:14}} />

                        <label style={{fontSize:14, color:C.textMid, fontWeight:700, display:"block", marginBottom:8}}>Type</label>
                        <div style={{display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8, marginBottom:14}}>
                          {TYPES.map(t => (
                            <button key={t.id} onClick={() => setNewChallenge(n => ({...n, type:t.id, unit:t.units[0]}))}
                              style={{padding:"12px 6px", borderRadius:12, border:newChallenge.type===t.id?`2px solid ${C.blue}`:`2px solid ${C.border}`,
                                background:newChallenge.type===t.id?C.blueLight:C.bg, color:newChallenge.type===t.id?C.blue:C.textMid,
                                fontWeight:700, fontSize:13, cursor:"pointer", fontFamily:"inherit", display:"flex", flexDirection:"column", alignItems:"center", gap:4}}>
                              <span style={{fontSize:22}}>{t.icon}</span>{t.label}
                            </button>
                          ))}
                        </div>

                        <div style={{display:"grid", gridTemplateColumns: newChallenge.type==="steps" ? "1fr" : "1fr 1fr", gap:10, marginBottom:14}}>
                          {newChallenge.type !== "steps" && (
                            <div>
                              <label style={{fontSize:14, color:C.textMid, fontWeight:700, display:"block", marginBottom:6}}>
                                Goal ({newChallenge.unit})
                              </label>
                              <input type="number" placeholder={newChallenge.type==="running"?"20":"5"}
                                value={newChallenge.goal} onChange={e => setNewChallenge(n => ({...n, goal:e.target.value}))}
                                style={{...inputStyle}} />
                            </div>
                          )}
                          {newChallenge.type === "steps" && (
                            <div style={{background:C.greenLight, borderRadius:12, padding:"12px 14px"}}>
                              <div style={{fontSize:13, fontWeight:800, color:C.green, marginBottom:2}}>👟 Most Steps Wins</div>
                              <div style={{fontSize:13, color:C.textMid}}>No goal needed — whoever accumulates the most steps by the end date wins automatically</div>
                            </div>
                          )}
                          <div>
                            <label style={{fontSize:14, color:C.textMid, fontWeight:700, display:"block", marginBottom:6}}>Duration</label>
                            <div style={{display:"flex", gap:4, marginBottom:6}}>
                              {[3,7,14,30].map(d => (
                                <button key={d} onClick={() => setNewChallenge(n => ({...n, duration:d, customDuration:""}))}
                                  style={{flex:1, padding:"10px 2px", borderRadius:10,
                                    border: (newChallenge.duration===d && !newChallenge.customDuration) ? `2px solid ${C.blue}` : `1.5px solid ${C.border}`,
                                    background: (newChallenge.duration===d && !newChallenge.customDuration) ? C.blueLight : C.bg,
                                    color: (newChallenge.duration===d && !newChallenge.customDuration) ? C.blue : C.textMid,
                                    fontWeight:700, fontSize:13, cursor:"pointer", fontFamily:"inherit"}}>
                                  {d}d
                                </button>
                              ))}
                            </div>
                            <div style={{position:"relative"}}>

                      ))}
                      {calc.macroSplit === "custom" && (
                        <div style={{ marginTop: 8, padding: 14, background: C.blueLight, borderRadius: 12 }}>

                          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8 }}>
                            {[{k:"customCarbs",label:"Carbs %",color:C.orange},{k:"customProtein",label:"Protein %",color:C.green},{k:"customFat",label:"Fat %",color:C.purple}].map(f => (

                    {/* Calculate button & results */}
                    {(() => {
                      const canCalc = calc.age && calc.currentWeight && calc.goalWeight && calc.activity &&

                      if (!canCalc) return (
                        <div style={{ textAlign: "center", padding: "12px", color: C.textLight, fontSize: 13, fontWeight: 600 }}>
                          Fill in your stats above to see your results
                        </div>
                      );

                      // Convert to metric
                      const weightKg = calc.unit === "imperial" ? parseFloat(calc.currentWeight) * 0.453592 : parseFloat(calc.currentWeight);
                      const goalKg   = calc.unit === "imperial" ? parseFloat(calc.goalWeight)   * 0.453592 : parseFloat(calc.goalWeight);
                      const heightCm = calc.unit === "imperial"
                        ? (parseFloat(calc.heightFt)||0)*30.48 + (parseFloat(calc.heightIn)||0)*2.54
                        : parseFloat(calc.heightCm);
                      const age = parseFloat(calc.age);

                      // BMR — Mifflin-St Jeor or Katch-McArdle if body fat known
                      let bmr;
                      if (calc.bodyFat && parseFloat(calc.bodyFat) > 0) {
                        const lbm = weightKg * (1 - parseFloat(calc.bodyFat)/100);
                        bmr = 370 + 21.6 * lbm; // Katch-McArdle
                      } else {
                        bmr = calc.sex === "male"
                          ? 10 * weightKg + 6.25 * heightCm - 5 * age + 5
                          : 10 * weightKg + 6.25 * heightCm - 5 * age - 161;
                      }

                      const actMult = { sedentary:1.2, light:1.375, moderate:1.55, active:1.725, athlete:1.9 }[calc.activity];
                      const tdee = Math.round(bmr * actMult);

                      // Adjust for goal weight
                      const diff = goalKg - weightKg;
                      let targetCals;
                      if (Math.abs(diff) < 0.5) {
                        targetCals = tdee; // maintenance
                      } else if (diff < 0) {
                        // Lose: deficit scaled by how much to lose, capped at 1000 kcal/day
                        const deficit = Math.min(Math.abs(diff) * 110, 1000);
                        targetCals = Math.max(tdee - deficit, calc.sex === "male" ? 1500 : 1200);
                      } else {
                        // Gain: surplus, capped at 500
                        const surplus = Math.min(diff * 110, 500);
                        targetCals = tdee + surplus;
                      }
                      targetCals = Math.round(targetCals);

                      // Macro split
                      let carbPct, protPct, fatPct;
                      if (calc.macroSplit === "balanced")    { carbPct=40; protPct=30; fatPct=30; }
                      else if (calc.macroSplit === "highprotein") { carbPct=30; protPct=40; fatPct=30; }
                      else if (calc.macroSplit === "lowcarb")    { carbPct=20; protPct=40; fatPct=40; }
                      else if (calc.macroSplit === "keto")       { carbPct=5;  protPct=25; fatPct=70; }
                      else { carbPct=parseFloat(calc.customCarbs)||33; protPct=parseFloat(calc.customProtein)||34; fatPct=parseFloat(calc.customFat)||33; }

                      const protG = Math.round((targetCals * protPct/100) / 4);
                      const carbG = Math.round((targetCals * carbPct/100) / 4);
                      const fatG  = Math.round((targetCals * fatPct/100)  / 9);

                      const goalType = Math.abs(diff) < 0.5 ? "Maintenance" : diff < 0 ? "Fat Loss" : "Muscle Gain";
                      const goalColor = Math.abs(diff) < 0.5 ? C.green : diff < 0 ? C.blue : C.orange;

                      return (
                        <div>
                          {/* Result card */}
                          <div style={{ background: C.card, borderRadius: 16, border: `2px solid ${goalColor}33`, padding: 18, marginBottom: 12, boxShadow: "0 2px 12px rgba(0,0,0,0.06)" }}>
                            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 16 }}>
                              <div>
                                <div style={{ fontSize: 11, color: C.textLight, fontWeight: 700, textTransform: "uppercase", letterSpacing: 0.5 }}>Your Plan</div>
                                <div style={{ fontSize: 16, fontWeight: 900, color: goalColor }}>{goalType}</div>
                              </div>
                              <div style={{ textAlign: "right" }}>
                                <div style={{ fontSize: 11, color: C.textLight, fontWeight: 700 }}>TDEE</div>
                                <div style={{ fontSize: 14, fontWeight: 800, color: C.textMid }}>{tdee} cal/day</div>
                              </div>
                            </div>

                            {/* Big calorie number */}
                            <div style={{ textAlign: "center", marginBottom: 18, padding: "14px", background: `${goalColor}11`, borderRadius: 14 }}>
                              <div style={{ fontSize: 11, color: C.textMid, fontWeight: 700, textTransform: "uppercase", letterSpacing: 1 }}>Daily Calorie Target</div>
                              <div style={{ fontSize: 56, fontWeight: 900, color: goalColor, lineHeight: 1.1 }}>{targetCals}</div>
                              <div style={{ fontSize: 12, color: C.textLight, fontWeight: 600 }}>calories per day</div>
                            </div>

                            {/* Macro breakdown */}
                            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10, marginBottom: 16 }}>
                              {[
                                { label: "Protein", g: protG, pct: protPct, color: C.green, cal: protG*4 },
                                { label: "Carbs",   g: carbG, pct: carbPct, color: C.orange, cal: carbG*4 },
                                { label: "Fat",     g: fatG,  pct: fatPct,  color: C.purple, cal: fatG*9 },
                              ].map(m => (
                                <div key={m.label} style={{ textAlign: "center", background: C.bg, borderRadius: 12, padding: "12px 8px" }}>
                                  <div style={{ fontSize: 25, fontWeight: 900, color: m.color }}>{m.g}g</div>
                                  <div style={{ fontSize: 11, fontWeight: 800, color: C.textMid }}>{m.label}</div>
                                  <div style={{ fontSize: 13, color: C.textLight }}>{m.pct}% · {m.cal} cal</div>
                                </div>
                              ))}
                            </div>

                            {/* Weekly projection */}
                            {Math.abs(diff) >= 0.5 && (() => {
                              const dailyDiff = diff < 0 ? tdee - targetCals : targetCals - tdee;
                              const weeklyChange = calc.unit === "imperial"
                                ? ((dailyDiff * 7) / 3500).toFixed(1) + " lbs/week"
                                : ((dailyDiff * 7) / 7700).toFixed(2) + " kg/week";
                              return (
                                <div style={{ background: `${goalColor}11`, borderRadius: 10, padding: "10px 14px", display: "flex", justifyContent: "space-between" }}>
                                  <span style={{ fontSize: 12, fontWeight: 700, color: C.textMid }}>Estimated rate</span>
                                  <span style={{ fontSize: 12, fontWeight: 800, color: goalColor }}>{diff < 0 ? "−" : "+"}{weeklyChange}</span>
                                </div>
                              );
                            })()}
                          </div>

                          {/* Apply button */}
                          <button onClick={() => {
                            setGoals({ calories: targetCals, protein: protG, carbs: carbG, fat: fatG });
                            showToast("Goals updated from calculator!");
                            setGoalsSubTab("view");
                          }}
                            style={{ width: "100%", padding: "15px", borderRadius: 14, border: "none", background: goalColor, color: "#fff", fontWeight: 900, fontSize: 17, cursor: "pointer", fontFamily: "inherit", boxShadow: `0 4px 16px ${goalColor}44` }}>
                            ✓ Apply These Goals
                          </button>
                        </div>
                      );
                    })()}
                  </div>
                )}
              </div>
            )}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/sw.js");
      });
    }
  </script>
</body>
</html>
