    button:active { transform: scale(0.96); transition: transform 0.1s ease; }
    /* Tab transitions */
    .tab-content { animation: tabIn 0.18s ease; }
    @keyframes tabIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideUp { from { opacity:0; transform:translateY(20px);} to { opacity:1; transform:translateY(0);} }
    @keyframes slideDown { from { opacity:0; transform:translateY(-8px);} to { opacity:1; transform:translateY(0);} }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
    /* Bottom tab bar safe area */

    /* Prevent selection on long press */

  <script>
    // Hide splash once React renders
    window.addEventListener("load", () => {

        if (splash) { splash.style.opacity = "0"; setTimeout(() => splash.remove(), 400); }

  <!-- Food database (separate for Babel performance) -->
  <script src="/foods.js"></script>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    const STORAGE_KEY = "macro-tracker-data-v2";

    // Handle ?tab= URL shortcuts from manifest
    const urlParams = new URLSearchParams(window.location.search);
    const initialTab = urlParams.get("tab") || "dash";

    const PRESET_FOODS = (window.FOODS_DB || []).map(f => ({
      name: f.n, calories: f.c, protein: f.p, carbs: f.r, fat: f.f
    }));

    const MEAL_TYPES = ["Breakfast", "Lunch", "Dinner", "Snack"];
    const MEAL_ICONS = { Breakfast: "🌅", Lunch: "☀️", Dinner: "🌙", Snack: "🍎" };
    const todayKey = () => {
      const d = new Date();
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return `${y}-${m}-${day}`;
    };
    const dateKey = (d) => {
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return `${y}-${m}-${day}`;
    };
    const emptyGoals = { calories: 2000, protein: 150, carbs: 200, fat: 65 };

    const LIGHT = {
      blue: "#2e6b3a", blueDark: "#1f4a28", blueLight: "#e8f3e8",
      green: "#2e6b3a", greenLight: "#e8f3e8",
      orange: "#c9883a", orangeLight: "#f5ede0",
      red: "#b84040", redLight: "#f5e8e8",
      purple: "#5a6ab0", purpleLight: "#eaecf8",
      bg: "#f4f7f2", card: "#ffffff", border: "#ddeadd",
      text: "#1a2e1e", textMid: "#4a6a50", textLight: "#7a9a7e",
    };
    const DARK = {
      blue: "#4aac5c", blueDark: "#2e7a40", blueLight: "#1a3020",
      green: "#4aac5c", greenLight: "#1a3020",
      orange: "#d4944a", orangeLight: "#2a1e0a",
      red: "#d45555", redLight: "#2a1010",
      purple: "#7a8acc", purpleLight: "#1a1e30",
      bg: "#0f1a12", card: "#1a2e1e", border: "#2a4030",
      text: "#e8f3e8", textMid: "#9abaa0", textLight: "#5a7a60",
    };

    const inputStyle = {
      width: "100%", background: "#f0f5f0", border: `1.5px solid ${C.border}`,
      borderRadius: 12, padding: "13px 16px", color: C.text,
      fontSize: 17, outline: "none", boxSizing: "border-box",
      fontFamily: "inherit", transition: "border-color 0.2s",
    };

    function MacroCircle({ value, goal, color, label, unit="", textColor }) {
      const pct = Math.min((value / goal) * 100, 100);
      const over = value > goal;
      const r = 26, circ = 2 * Math.PI * r;
      const tc = textColor || C.text;
      const tcLight = textColor ? "rgba(255,255,255,0.7)" : C.textLight;
      const tcMid = textColor ? "rgba(255,255,255,0.9)" : C.textMid;
      const trackColor = textColor ? "rgba(255,255,255,0.2)" : C.border;
      return (
        <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 4 }}>
          <div style={{ position: "relative", width: 64, height: 64 }}>
            <svg width={64} height={64} viewBox="0 0 64 64">
              <circle cx={32} cy={32} r={r} fill="none" stroke={trackColor} strokeWidth={5} />
              <circle cx={32} cy={32} r={r} fill="none"
                stroke={over ? C.red : color}
                strokeWidth={5}
                strokeDasharray={`${(pct/100)*circ} ${circ}`}
                strokeDashoffset={circ*0.25}
                strokeLinecap="round"
                style={{ transition: "stroke-dasharray 0.5s ease" }}
              />
            </svg>
            <div style={{ position: "absolute", inset: 0, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>
              <div style={{ fontSize: 15, fontWeight: 900, color: over ? "#ffcdd2" : tc, lineHeight: 1 }}>{Math.round(value)}</div>
              <div style={{ fontSize: 12, color: tcLight, fontWeight: 600 }}>{unit || "g"}</div>
            </div>
          </div>
          <div style={{ fontSize: 12, fontWeight: 800, color: tcMid, textTransform: "uppercase", letterSpacing: 0.5 }}>{label}</div>
          <div style={{ fontSize: 13, color: tcLight }}>{goal}{unit || "g"}</div>
        </div>
      );
    }

    function MacroBar({ label, value, goal, color }) {
      const pct = Math.min((value / goal) * 100, 100);
      const over = value > goal;
      const left = goal - value;
      return (
        <div style={{ marginBottom: 12 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 5 }}>
            <span style={{ fontSize: 13, fontWeight: 700, color: C.textMid }}>{label}</span>
            <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
              <span style={{ fontSize: 12, color: C.textLight }}>{Math.round(value)}g</span>
              <span style={{ fontSize: 11, color: C.textLight }}>·</span>
              <span style={{ fontSize: 12, fontWeight: 700, color: over ? C.red : C.green }}>
                {over ? `${Math.round(Math.abs(left))}g over` : `${Math.round(left)}g left`}
              </span>
            </div>
          </div>
          <div style={{ height: 7, background: C.border, borderRadius: 99, overflow: "hidden" }}>
            <div style={{ height: "100%", width: `${pct}%`, borderRadius: 99, background: over ? C.red : color, transition: "width 0.5s ease" }} />
          </div>
        </div>
      );
    }

    function App() {
      const [tab, setTab] = useState(initialTab);
      const [googleUser, setGoogleUser] = useState(null);
      const [authLoading, setAuthLoading] = useState(true);
      const [challenges, setChallenges] = useState({});
      const [pendingInvites, setPendingInvites] = useState([]);
      const [challengeTab, setChallengeTab] = useState("browse");
      const [newChallenge, setNewChallenge] = useState({ type:"workout", goal:"", unit:"sessions", duration:7, customDuration:"", name:"" });
      const [inviteEmail, setInviteEmail] = useState("");
      const challengeListeners = useRef({});
      const [garminActivities, setGarminActivities] = useState([]);
      const [activitiesSyncing, setActivitiesSyncing] = useState(false);
      const [fitConnected, setFitConnected] = useState(() => !!localStorage.getItem("mt-fit-token"));
      const [fitToken, setFitToken] = useState(() => localStorage.getItem("mt-fit-token") || "");
      const [fitSteps, setFitSteps] = useState(null);
      const [fitSyncing, setFitSyncing] = useState(false);
      const [fitHealth, setFitHealth] = useState(() => {
        try { return JSON.parse(localStorage.getItem("mt-fit-health") || "null"); } catch { return null; }
      });
      const fitClientId = "675487262600-mrkuhk2sg3rc9i1jladv930uteoph9qb.apps.googleusercontent.com";
      const [goals, setGoals] = useState(emptyGoals);
      const [entries, setEntries] = useState({});
      const [form, setForm] = useState({ name: "", calories: "", protein: "", carbs: "", fat: "", meal: "Breakfast", qty: 1 });
      const [weightMode, setWeightMode] = useState(false);
      const [weightUnit, setWeightUnit] = useState("g");
      const [weightAmount, setWeightAmount] = useState("");
      const [per100, setPer100] = useState({ calories: "", protein: "", carbs: "", fat: "" });
      const [searchQuery, setSearchQuery] = useState("");
      const [showPresets, setShowPresets] = useState(false);
      const [editGoals, setEditGoals] = useState(false);
      const [goalDraft, setGoalDraft] = useState(emptyGoals);
      const [selectedDate, setSelectedDate] = useState(todayKey());
      const [toast, setToast] = useState(null);
      // Custom foods
      const [customFoods, setCustomFoods] = useState(() => { try { return JSON.parse(localStorage.getItem("mt-custom-foods") || "[]"); } catch { return []; } });
      const [showCustomFoodForm, setShowCustomFoodForm] = useState(false);
      const [customFoodForm, setCustomFoodForm] = useState({ name:"", calories:"", protein:"", carbs:"", fat:"", serving:"" });
      // Dark mode
      const [darkMode, setDarkMode] = useState(() => localStorage.getItem("mt-dark-mode") === "true");
      const C = darkMode ? DARK : LIGHT;
      // Workout planner show state
      const [showPlanner, setShowPlanner] = useState(false);
      const [plannerInput, setPlannerInput] = useState("");
      const [plannerDate, setPlannerDate] = useState(todayKey());
      // Challenge history tab
      const [challengeHistoryTab, setChallengeHistoryTab] = useState("active");
      // PR notifications tracking
      const [prNotified, setPrNotified] = useState(() => { try { return JSON.parse(localStorage.getItem("mt-pr-notified") || "{}"); } catch { return {}; } });
      // Water tracking
      const [waterLog, setWaterLog] = useState(() => { try { return JSON.parse(localStorage.getItem("mt-water") || "{}"); } catch { return {}; } });
      const [waterGoal] = useState(64); // oz
      // Body composition
      const [bodyComp, setBodyComp] = useState(() => { try { return JSON.parse(localStorage.getItem("mt-bodycomp") || "[]"); } catch { return []; } });
      // Meal templates
      const [mealTemplates, setMealTemplates] = useState(() => { try { return JSON.parse(localStorage.getItem("mt-meal-templates") || "[]"); } catch { return []; } });
      const [showSaveTemplate, setShowSaveTemplate] = useState(false);
      const [templateName, setTemplateName] = useState("");
      // Body comp form state (must be at top level, not inside render)
      const [bodyForm, setBodyForm] = useState({ date: todayKey(), weight: "", bodyFat: "", muscle: "", notes: "" });
      // Progress photos
      const [progressPhotos, setProgressPhotos] = useState(() => { try { return JSON.parse(localStorage.getItem("mt-progress-photos") || "[]"); } catch { return []; } });
      const [showPhotoTab, setShowPhotoTab] = useState(false);
      // Workout planner
      const [workoutPlan, setWorkoutPlan] = useState(() => { try { return JSON.parse(localStorage.getItem("mt-workout-plan") || "{}"); } catch { return {}; } });
      // Challenge history & taunts
      const [challengeHistory, setChallengeHistory] = useState(() => { try { return JSON.parse(localStorage.getItem("mt-challenge-history") || "[]"); } catch { return []; } });
      const [taunts, setTaunts] = useState({});
      const [tauntInput, setTauntInput] = useState("");
      const [notifPermission, setNotifPermission] = useState(() => typeof Notification !== "undefined" ? Notification.permission : "default");
      const [notifSettings, setNotifSettings] = useState(() => {
        try { return JSON.parse(localStorage.getItem("mt-notif-settings") || "null") || {
          logFood: true, logFoodTime: "08:00",
          workout: true, workoutTime: "07:00",
          steps: true,
          challenges: true,
          sleep: true, sleepTime: "21:30",
          weekly: true, weeklyDay: "0", weeklyTime: "09:00",
          water: true, waterTime1: "10:00", waterTime2: "13:00", waterTime3: "16:00", waterTime4: "19:00",
        }; } catch { return {}; }
      });
      const [notifLog, setNotifLog] = useState(() => {
        try { return JSON.parse(localStorage.getItem("mt-notif-log") || "[]"); } catch { return []; }
      });
      const [showNotifCenter, setShowNotifCenter] = useState(false);
      const notifTimers = useRef([]);
      const [goalsSubTab, setGoalsSubTab] = useState("view");
      const [weightLog, setWeightLog] = useState({});
      const [weightEntry, setWeightEntry] = useState("");
      const [bodyWeightUnit, setBodyWeightUnit] = useState("lbs");
      const [editingWeightDate, setEditingWeightDate] = useState(null);
      const [editingWeightVal, setEditingWeightVal] = useState("");
      const [workoutTab, setWorkoutTab] = useState("log");
      const [workouts, setWorkouts] = useState({});
      const [routines, setRoutines] = useState([]);
      const [activeWorkout, setActiveWorkout] = useState(null);
      const [workoutDate, setWorkoutDate] = useState(todayKey());
      const [showExercisePicker, setShowExercisePicker] = useState(false);
      const [exerciseSearch, setExerciseSearch] = useState("");
      const [showRoutineBuilder, setShowRoutineBuilder] = useState(false);
      const [routineDraft, setRoutineDraft] = useState({ name: "", exercises: [] });
      const [showCardioForm, setShowCardioForm] = useState(false);
      const [cardioForm, setCardioForm] = useState({ type: "Running", duration: "", distance: "", calories: "", notes: "" });
      const [editingWorkout, setEditingWorkout] = useState(null);
      const [editingCardio, setEditingCardio] = useState(null);
      const [calc, setCalc] = useState({
        sex: "male", age: "", unit: "imperial",
        heightFt: "", heightIn: "", heightCm: "",
        currentWeight: "", goalWeight: "", bodyFat: "",
        activity: "moderate", macroSplit: "balanced",
        customCarbs: "", customProtein: "", customFat: "",
      });

      useEffect(() => {
        try {
          const stored = localStorage.getItem(STORAGE_KEY);
          if (stored) {
            const d = JSON.parse(stored);
            if (d.goals) setGoals(d.goals);
            if (d.entries) setEntries(d.entries);
            if (d.workouts) setWorkouts(d.workouts);
            if (d.routines) setRoutines(d.routines);
            if (d.weightLog) setWeightLog(d.weightLog);
            if (d.bodyWeightUnit) setBodyWeightUnit(d.bodyWeightUnit);
          }
        } catch {}
      }, []);

      useEffect(() => {
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify({ goals, entries, workouts, routines, weightLog, bodyWeightUnit })); } catch {}
      }, [goals, entries, workouts, routines, weightLog, bodyWeightUnit]);

      // ── NOTIFICATIONS ────────────────────────────────────────────────────────
      const saveNotifSettings = (s) => {
        setNotifSettings(s);
        localStorage.setItem("mt-notif-settings", JSON.stringify(s));
      };

      const addNotifLog = (title, body) => {
        const entry = { id: Date.now(), title, body, at: Date.now(), read: false };
        setNotifLog(prev => {
          const updated = [entry, ...prev].slice(0, 50);
          localStorage.setItem("mt-notif-log", JSON.stringify(updated));
          return updated;
        });
      };

      const markAllRead = () => {
        setNotifLog(prev => {
          const updated = prev.map(n => ({ ...n, read: true }));
          localStorage.setItem("mt-notif-log", JSON.stringify(updated));
          return updated;
        });
      };

      const clearNotifLog = () => {
        setNotifLog([]);
        localStorage.removeItem("mt-notif-log");
      };

      const fireNotif = (title, body, tag) => {
        addNotifLog(title, body);
        if (notifPermission === "granted") {
          try {
            navigator.serviceWorker.ready.then(reg => {
              reg.showNotification(title, { body, icon: "/icon-192.png", badge: "/icon-192.png", tag: tag || title, vibrate: [100, 50, 100] });
            });
          } catch(e) { console.log("Notif error:", e); }
        }
      };

      const requestNotifPermission = async () => {
        if (typeof Notification === "undefined") { showToast("Notifications not supported on this device", "error"); return; }
        const result = await Notification.requestPermission();
        setNotifPermission(result);
        if (result === "granted") {
          showToast("Notifications enabled! 🔔");
          fireNotif("Macro Tracker", "You'll now get reminders and challenge updates!", "welcome");
          scheduleAllNotifs();
        } else {
          showToast("Notifications blocked — enable in browser settings", "error");
        }
      };

      const scheduleAllNotifs = () => {
        notifTimers.current.forEach(clearTimeout);
        notifTimers.current = [];
        if (notifPermission !== "granted") return;
        const s = notifSettings;
        const now = new Date();

        const scheduleDaily = (timeStr, callback) => {
          const [h, m] = timeStr.split(":").map(Number);
          const target = new Date();
          target.setHours(h, m, 0, 0);
          if (target <= now) target.setDate(target.getDate() + 1);
          const ms = target - now;
          const t = setTimeout(() => { callback(); scheduleDaily(timeStr, callback); }, ms);
          notifTimers.current.push(t);
        };

        if (s.logFood) scheduleDaily(s.logFoodTime, () => {
          const today = todayKey();
          const todayEntries = entries[today] || [];
          if (todayEntries.length === 0) fireNotif("🥗 Log your meals!", "You haven't logged any food today. Stay on track!", "food");
        });

        if (s.workout) scheduleDaily(s.workoutTime, () => {
          const today = todayKey();
          const todayWorkouts = workouts[today] || [];
          if (todayWorkouts.length === 0) fireNotif("💪 Time to train!", "No workout logged yet today. Let's go!", "workout");
        });

        if (s.sleep) scheduleDaily(s.sleepTime, () => {
          fireNotif("😴 Wind-down time", "Getting 7–9 hours of sleep helps recovery and weight management.", "sleep");
        });

        if (s.water) {
          const waterTimes = [s.waterTime1, s.waterTime2, s.waterTime3, s.waterTime4].filter(Boolean);
          waterTimes.forEach((timeStr, idx) => {
            scheduleDaily(timeStr, () => {
              const oz = waterLog[todayKey()] || 0;
              if (oz < waterGoal) {
                const remaining = waterGoal - oz;
                const messages = [
                  `You've had ${oz}oz so far — ${remaining}oz to go! 💧`,
                  `Hydration check! ${oz}oz down, ${remaining}oz left for today`,
                  `Keep it up! ${remaining}oz more to hit your ${waterGoal}oz goal`,
                  `Almost there — just ${remaining}oz left today! 💧`,
                ];
                fireNotif("💧 Drink Water!", messages[idx % messages.length], "water-" + idx);
              }
            });
          });
        }

        if (s.weekly) {
          const scheduleWeekly = () => {
            const [h, m] = s.weeklyTime.split(":").map(Number);
            const target = new Date();
            const targetDay = parseInt(s.weeklyDay);
            target.setHours(h, m, 0, 0);
            const daysUntil = (targetDay - now.getDay() + 7) % 7 || 7;
            target.setDate(target.getDate() + daysUntil);
            const ms = target - now;
            const t = setTimeout(() => {
              const last7 = Array.from({length:7}, (_, i) => { const d = new Date(); d.setDate(d.getDate()-i); return dateKey(d); });
              const totalCal = last7.reduce((a,d) => a + (entries[d]||[]).reduce((s,e) => s+e.calories*e.qty, 0), 0);
              const daysLogged = last7.filter(d => (entries[d]||[]).length > 0).length;
              const daysWorked = last7.filter(d => (workouts[d]||[]).length > 0).length;
              fireNotif("📊 Your Weekly Summary", `${daysLogged}/7 days logged · ${daysWorked} workouts · ${Math.round(totalCal/7)} avg cal/day`, "weekly");

          const res = await fetch("https://www.googleapis.com/fitness/v1/users/me/dataset:aggregate", {
            method: "POST",
            headers: { Authorization: "Bearer " + fitToken, "Content-Type": "application/json" },
            body: JSON.stringify(body),
          });
          if (res.status === 401) {
            disconnectGoogleFit();
            showToast("Google Fit session expired — reconnect", "error");
            setFitSyncing(false);
            return;
          }
          const data = await res.json();
          let totalSteps = 0;
          const dailyBreakdown = {};
          (data.bucket || []).forEach(b => {
            const dayKey = new Date(parseInt(b.startTimeMillis)).toISOString().split("T")[0];
            let daySteps = 0;
            (b.dataset || []).forEach(ds => {
              (ds.point || []).forEach(pt => {
                (pt.value || []).forEach(v => { daySteps += (v.intVal || 0); });
              });
            });
            if (daySteps > 0) { dailyBreakdown[dayKey] = daySteps; totalSteps += daySteps; }
          });

          // Write under Firebase UID — ensure player entry exists first
          const writeRef = "challenges/" + challengeId + "/players/" + userId;
          const playerData = {
            progress: totalSteps,
            lastSynced: Date.now(),
            name: userName,
            email: userEmail,
            photo: userPhoto || "",
            uid: userId,
            ...(Object.keys(dailyBreakdown).length > 0 ? { dailySteps: dailyBreakdown } : {}),
          };
          await db.ref(writeRef).update(playerData);

          // Also register in userChallenges in case they joined via invite
          await db.ref("userChallenges/" + userId + "/" + challengeId).set(true);

          // Update local state
          setChallenges(prev => ({
            ...prev,
            [challengeId]: {
              ...prev[challengeId],
              players: {
                ...prev[challengeId]?.players,
                [userId]: {
                  ...prev[challengeId]?.players?.[userId],
                  ...playerData,
                }
              }
            }
          }));
          setFitSteps(totalSteps);

          if (totalSteps === 0) {
            showToast("Got 0 steps from Google Fit — check that Garmin is synced to Google Fit app", "error");
          } else {
            showToast("Synced " + totalSteps.toLocaleString() + " steps! 🏃");
          }
        } catch (e) {
          console.error("Sync error:", e);
          showToast("Sync failed — try reconnecting Google Fit", "error");
        }
        setFitSyncing(false);
      };

      const showToast = (msg, type="success") => {
        setToast({ msg, type });
        setTimeout(() => setToast(null), type === "error" ? 5000 : 2200);
      };

      const haptic = (style="light") => {
        if (!navigator.vibrate) return;
        if (style === "light") navigator.vibrate(8);
        else if (style === "medium") navigator.vibrate(20);
        else if (style === "success") navigator.vibrate([10, 50, 10]);
        else if (style === "error") navigator.vibrate([30, 20, 30]);
      };

      const toggleDarkMode = () => {
        const next = !darkMode;
        setDarkMode(next);
        localStorage.setItem("mt-dark-mode", String(next));
        haptic("light");
      };

      // ── CUSTOM FOODS ─────────────────────────────────────────────────────────
      const saveCustomFood = () => {
        if (!customFoodForm.name || !customFoodForm.calories) return;
        const food = {
          name: customFoodForm.name.trim(),
          calories: parseFloat(customFoodForm.calories) || 0,
          protein: parseFloat(customFoodForm.protein) || 0,
          carbs: parseFloat(customFoodForm.carbs) || 0,
          fat: parseFloat(customFoodForm.fat) || 0,
          serving: customFoodForm.serving || "1 serving",
          custom: true,
        };
        const updated = [...customFoods, food];
        setCustomFoods(updated);
        localStorage.setItem("mt-custom-foods", JSON.stringify(updated));
        setCustomFoodForm({ name:"", calories:"", protein:"", carbs:"", fat:"", serving:"" });
        setShowCustomFoodForm(false);
        showToast("Food saved: " + food.name + " 🍽️");
        haptic("success");
      };
      const deleteCustomFood = (name) => {
        const updated = customFoods.filter(f => f.name !== name);
        setCustomFoods(updated);
        localStorage.setItem("mt-custom-foods", JSON.stringify(updated));
      };

      // All foods = presets + custom
      const ALL_FOODS = [...PRESET_FOODS, ...customFoods];

      // PWA install prompt
      const [installPrompt, setInstallPrompt] = React.useState(null);
      const [showInstallBanner, setShowInstallBanner] = React.useState(false);
      useEffect(() => {
        const handler = (e) => {
          e.preventDefault();
          setInstallPrompt(e);
          const dismissed = localStorage.getItem("mt-install-dismissed");
          if (!dismissed) setShowInstallBanner(true);
        };
        window.addEventListener("beforeinstallprompt", handler);
        return () => window.removeEventListener("beforeinstallprompt", handler);
      }, []);

      const handleInstall = async () => {
        if (!installPrompt) return;
        installPrompt.prompt();
        const { outcome } = await installPrompt.userChoice;
        if (outcome === "accepted") { showToast("App installed! 🎉"); haptic("success"); }
        setShowInstallBanner(false);
        setInstallPrompt(null);
      };

      // ── WATER TRACKING ──────────────────────────────────────────────────────
      const logWater = (oz) => {
        const key = todayKey();
        setWaterLog(prev => {
          const updated = { ...prev, [key]: Math.min((prev[key] || 0) + oz, 200) };
          localStorage.setItem("mt-water", JSON.stringify(updated));
          return updated;
        });
        haptic("light");
      };
      const resetWater = () => {
        const key = todayKey();
        setWaterLog(prev => { const u = {...prev, [key]: 0}; localStorage.setItem("mt-water", JSON.stringify(u)); return u; });
      };
      const todayWater = waterLog[todayKey()] || 0;

      // ── BODY COMPOSITION ────────────────────────────────────────────────────
      const logBodyComp = (entry) => {
        const updated = [...bodyComp.filter(e => e.date !== entry.date), entry].sort((a,b) => a.date.localeCompare(b.date));
        setBodyComp(updated);
        localStorage.setItem("mt-bodycomp", JSON.stringify(updated));
        showToast("Body stats saved!");
        haptic("success");
      };

      // ── MEAL TEMPLATES ───────────────────────────────────────────────────────
      const saveMealTemplate = () => {
        if (!templateName.trim() || dayEntries.length === 0) return;
        const template = { id: Date.now(), name: templateName.trim(), entries: dayEntries, savedAt: Date.now() };
        const updated = [...mealTemplates, template];
        setMealTemplates(updated);
        localStorage.setItem("mt-meal-templates", JSON.stringify(updated));
        setTemplateName("");
        setShowSaveTemplate(false);
        showToast("Template saved: " + template.name);
        haptic("success");
      };
      const loadMealTemplate = (template) => {
        const newEntries = template.entries.map(e => ({ ...e, id: Date.now() + Math.random() }));
        setEntries(prev => ({ ...prev, [selectedDate]: [...(prev[selectedDate]||[]), ...newEntries] }));
        showToast("Loaded: " + template.name);
        haptic("success");
      };
      const deleteMealTemplate = (id) => {
        const updated = mealTemplates.filter(t => t.id !== id);
        setMealTemplates(updated);
        localStorage.setItem("mt-meal-templates", JSON.stringify(updated));
      };

      // ── RECOVERY SCORE ───────────────────────────────────────────────────────
      const recoveryScore = (() => {
        if (!fitHealth) return null;
        let score = 50;
        const sleep = fitHealth.sleepMins || 0;
        const rhr = fitHealth.rhr || 0;
        // Sleep score (0-35 pts)
        if (sleep >= 480) score += 35;
        else if (sleep >= 420) score += 28;
        else if (sleep >= 360) score += 18;
        else if (sleep >= 300) score += 8;
        // Resting HR score (0-25 pts) — lower is better
        if (rhr > 0) {
          if (rhr < 55) score += 25;
          else if (rhr < 65) score += 18;
          else if (rhr < 75) score += 10;
          else if (rhr < 85) score += 4;
        }
        // Steps bonus (0-10 pts)
        const steps = fitHealth.steps || 0;
        if (steps >= 10000) score += 10;
        else if (steps >= 7500) score += 7;
        else if (steps >= 5000) score += 4;
        return Math.min(Math.round(score), 100);
      })();

      const recoveryLabel = recoveryScore === null ? null
        : recoveryScore >= 80 ? { label: "Peak", color: "#2e6b3a", bg: "#e8f3e8" }
        : recoveryScore >= 65 ? { label: "Good", color: "#5a9a4a", bg: "#eef5e8" }
        : recoveryScore >= 50 ? { label: "Moderate", color: "#c9883a", bg: "#f5ede0" }
        : { label: "Low", color: "#b84040", bg: "#f5e8e8" };

      // ── TAUNTS ───────────────────────────────────────────────────────────────
      const sendTaunt = async (challengeId) => {
        if (!tauntInput.trim() || !googleUser) return;
        const ref = db.ref("challengeTaunts/" + challengeId);
        const newTaunt = { from: userName, photo: userPhoto || "", msg: tauntInput.trim(), at: Date.now() };

        setTauntInput("");
        haptic("medium");
        showToast("Trash talk sent 🗣️");
      };

      const challengeIds = Object.keys(challenges).join(",");
      useEffect(() => {
        const unsubs = [];
        Object.keys(challenges).forEach(id => {
          const ref = db.ref("challengeTaunts/" + id);
          const handler = ref.on("value", snap => {
            const data = snap.val();
            setTaunts(prev => ({ ...prev, [id]: data ? Object.values(data).sort((a,b) => a.at - b.at) : [] }));
          });
          unsubs.push(() => ref.off("value", handler));
        });
        return () => unsubs.forEach(u => u());
      }, [challengeIds]);

      // ── WORKOUT PLANNER ──────────────────────────────────────────────────────
      const savePlannedWorkout = (dateKey, name) => {
        const updated = { ...workoutPlan, [dateKey]: [...(workoutPlan[dateKey] || []), { id: Date.now(), name }] };
        setWorkoutPlan(updated);
        localStorage.setItem("mt-workout-plan", JSON.stringify(updated));
        haptic("light");
      };
      const removePlannedWorkout = (dateKey, id) => {
        const updated = { ...workoutPlan, [dateKey]: (workoutPlan[dateKey] || []).filter(w => w.id !== id) };
        setWorkoutPlan(updated);
        localStorage.setItem("mt-workout-plan", JSON.stringify(updated));
      };

      const dayEntries = entries[selectedDate] || [];
      const totals = dayEntries.reduce(
        (acc, e) => ({ calories: acc.calories + e.calories * e.qty, protein: acc.protein + e.protein * e.qty, carbs: acc.carbs + e.carbs * e.qty, fat: acc.fat + e.fat * e.qty }),
        { calories: 0, protein: 0, carbs: 0, fat: 0 }
      );

      const addEntry = () => {
        let cal, pro, carb, fat, entryName;
        if (weightMode) {
          if (!form.name || !weightAmount || !per100.calories) return;
          const grams = weightUnit === "oz" ? parseFloat(weightAmount) * 28.3495 : parseFloat(weightAmount);
          const ratio = grams / 100;
          cal = (parseFloat(per100.calories)||0) * ratio;
          pro = (parseFloat(per100.protein)||0) * ratio;
          carb = (parseFloat(per100.carbs)||0) * ratio;
          fat = (parseFloat(per100.fat)||0) * ratio;
          entryName = `${form.name} (${parseFloat(weightAmount)}${weightUnit})`;
        } else {
          if (!form.name || !form.calories) return;
          cal = parseFloat(form.calories)||0;
          pro = parseFloat(form.protein)||0;
          carb = parseFloat(form.carbs)||0;
          fat = parseFloat(form.fat)||0;
          entryName = form.name;
        }
        const entry = { id: Date.now(), name: entryName, calories: cal, protein: pro, carbs: carb, fat, meal: form.meal, qty: weightMode ? 1 : (parseFloat(form.qty)||1) };
        setEntries(prev => ({ ...prev, [selectedDate]: [...(prev[selectedDate]||[]), entry] }));
        setForm({ name: "", calories: "", protein: "", carbs: "", fat: "", meal: form.meal, qty: 1 });
        setPer100({ calories: "", protein: "", carbs: "", fat: "" });
        setWeightAmount("");
        setSearchQuery("");
        setShowPresets(false);
        showToast(`Added ${entryName}`);
        haptic("success");
        setTab("log");
      };

      const removeEntry = (id) => setEntries(prev => ({ ...prev, [selectedDate]: (prev[selectedDate]||[]).filter(e => e.id !== id) }));

      const selectPreset = (p) => {
        if (weightMode) {
          setForm(f => ({ ...f, name: p.name }));
          setPer100({ calories: p.calories, protein: p.protein, carbs: p.carbs, fat: p.fat });
        } else {
          setForm(f => ({ ...f, name: p.name, calories: p.calories, protein: p.protein, carbs: p.carbs, fat: p.fat }));
        }
        setShowPresets(false);
        setSearchQuery("");
      };

      const saveGoals = () => { setGoals(goalDraft); setEditGoals(false); showToast("Goals saved!"); };

      const mealGroups = MEAL_TYPES.map(m => ({ meal: m, items: dayEntries.filter(e => e.meal === m) })).filter(g => g.items.length > 0);
      const filtered = ALL_FOODS.filter(p => p.name.toLowerCase().includes(searchQuery.toLowerCase()));
      const caloriesLeft = goals.calories - totals.calories;
      const calPct = Math.min((totals.calories / goals.calories) * 100, 100);
      const isToday = selectedDate === todayKey();

      const formatDate = (d) => {
        const date = new Date(d + "T12:00:00");
        if (d === todayKey()) return "Today";
        return date.toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric" });
      };

      return (
        <div style={{ minHeight: "100dvh", background: C.bg, display: "flex", flexDirection: "column", maxWidth: 480, margin: "0 auto", paddingBottom: "calc(64px + env(safe-area-inset-bottom))" }}>

          {/* Toast */}
          {toast && (
            <div style={{ position: "fixed", top: 16, left: "50%", transform: "translateX(-50%)", background: toast.type === "success" ? C.green : C.red, color: "#fff", padding: "10px 20px", borderRadius: 99, fontSize: 13, fontWeight: 700, zIndex: 999, whiteSpace: "nowrap", boxShadow: "0 4px 20px rgba(0,0,0,0.15)", animation: "slideDown 0.2s ease" }}>
              ✓ {toast.msg}
            </div>
          )}

          {/* Notification Center Panel */}
          {showNotifCenter && (
            <div style={{ position: "fixed", top: 0, left: "50%", transform: "translateX(-50%)", width: "100%", maxWidth: 480, height: "100vh", background: C.bg, zIndex: 998, display: "flex", flexDirection: "column", animation: "slideDown 0.2s ease" }}>
              <div style={{ background: C.blue, padding: "20px 20px 16px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                <div style={{ fontSize: 20, fontWeight: 900, color: "#fff" }}>🔔 Notifications</div>
                <button onClick={() => setShowNotifCenter(false)} style={{ background: "rgba(255,255,255,0.15)", border: "none", color: "#fff", width: 36, height: 36, borderRadius: 99, fontSize: 20, cursor: "pointer", fontFamily: "inherit" }}>×</button>
              </div>
              <div style={{ flex: 1, overflowY: "auto", padding: 16 }}>

                {/* Permission banner */}
                {notifPermission !== "granted" && (
                  <div style={{ background: C.orangeLight, border: `1px solid ${C.orange}44`, borderRadius: 14, padding: 16, marginBottom: 16 }}>
                    <div style={{ fontSize: 15, fontWeight: 800, color: C.orange, marginBottom: 6 }}>🔔 Enable Push Notifications</div>
                    <div style={{ fontSize: 13, color: C.textMid, marginBottom: 12 }}>Get reminders, step goal alerts, and real-time challenge updates even when the app is in the background.</div>
                    <button onClick={requestNotifPermission} style={{ width: "100%", padding: 13, borderRadius: 12, border: "none", background: C.orange, color: "#fff", fontWeight: 800, fontSize: 15, cursor: "pointer", fontFamily: "inherit" }}>
                      Enable Notifications
                    </button>
                  </div>
                )}

                {/* Notification settings */}
                <div style={{ background: C.card, borderRadius: 14, border: `1px solid ${C.border}`, padding: 16, marginBottom: 16 }}>
                  <div style={{ fontSize: 15, fontWeight: 800, color: C.text, marginBottom: 14 }}>⚙️ Settings</div>
                  {[
                    { key: "logFood", label: "🥗 Daily food reminder", timeKey: "logFoodTime" },
                    { key: "workout", label: "💪 Workout reminder", timeKey: "workoutTime" },
                    { key: "sleep", label: "😴 Sleep reminder", timeKey: "sleepTime" },
                    { key: "steps", label: "👟 Step goal alerts", timeKey: null },
                    { key: "challenges", label: "🏆 Challenge updates", timeKey: null },
                    { key: "water", label: "💧 Water reminders", timeKey: null },
                    { key: "weekly", label: "📊 Weekly summary", timeKey: "weeklyTime" },
                  ].map(item => (
                    <div key={item.key} style={{ paddingBottom: 12, marginBottom: 12, borderBottom: `1px solid ${C.border}` }}>
                      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                        <div style={{ flex: 1 }}>
                          <div style={{ fontSize: 14, fontWeight: 700, color: C.text }}>{item.label}</div>
                          {item.timeKey && notifSettings[item.key] && (
                            <input type="time" value={notifSettings[item.timeKey]}
                              onChange={e => saveNotifSettings({ ...notifSettings, [item.timeKey]: e.target.value })}
                              style={{ marginTop: 6, background: C.bg, border: `1px solid ${C.border}`, borderRadius: 8, padding: "5px 10px", fontSize: 13, fontFamily: "inherit", color: C.text }} />
                          )}
                          {item.key === "weekly" && notifSettings.weekly && (
                            <select value={notifSettings.weeklyDay}
                              onChange={e => saveNotifSettings({ ...notifSettings, weeklyDay: e.target.value })}

                                {["waterTime1","waterTime2","waterTime3","waterTime4"].map((tk, i) => (

                                ))}
                              </div>
                            </div>

                        </div>
                        <button onClick={() => saveNotifSettings({ ...notifSettings, [item.key]: !notifSettings[item.key] })}

                          <div style={{ width: 20, height: 20, borderRadius: 99, background: "#fff", position: "absolute", top: 3, transition: "left 0.2s",
                            left: notifSettings[item.key] ? 25 : 3 }} />
                        </button>
                      </div>
                    </div>
                  ))}
                </div>

                {/* Notification log */}
                <div style={{ background: C.card, borderRadius: 14, border: `1px solid ${C.border}`, padding: 16 }}>
                  <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 14 }}>
                    <div style={{ fontSize: 15, fontWeight: 800, color: C.text }}>Recent</div>
                    <div style={{ display: "flex", gap: 8 }}>
                      <button onClick={markAllRead} style={{ fontSize: 12, color: C.green, fontWeight: 700, background: "none", border: "none", cursor: "pointer", fontFamily: "inherit" }}>Mark all read</button>
                      <button onClick={clearNotifLog} style={{ fontSize: 12, color: C.textLight, fontWeight: 700, background: "none", border: "none", cursor: "pointer", fontFamily: "inherit" }}>Clear</button>
                    </div>
                  </div>
                  {notifLog.length === 0 ? (
                    <div style={{ textAlign: "center", padding: "24px 0", color: C.textLight, fontSize: 14 }}>No notifications yet</div>
                  ) : notifLog.map(n => (
                    <div key={n.id} style={{ display: "flex", gap: 12, padding: "10px 0", borderBottom: `1px solid ${C.border}`, opacity: n.read ? 0.6 : 1 }}>
                      {!n.read && <div style={{ width: 8, height: 8, borderRadius: 99, background: C.green, flexShrink: 0, marginTop: 5 }} />}
                      {n.read && <div style={{ width: 8, flexShrink: 0 }} />}
                      <div style={{ flex: 1 }}>
                        <div style={{ fontSize: 14, fontWeight: 800, color: C.text }}>{n.title}</div>
                        <div style={{ fontSize: 13, color: C.textMid, marginTop: 2 }}>{n.body}</div>
                        <div style={{ fontSize: 11, color: C.textLight, marginTop: 4 }}>
                          {new Date(n.at).toLocaleString("en-US", { month: "short", day: "numeric", hour: "numeric", minute: "2-digit" })}
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          )}

          {/* Header */}
          <div style={{ background: C.blue, padding: "20px 20px 0" }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: tab === "dash" ? 16 : 12 }}>
              <div>
                <div style={{ fontSize: 13, color: "rgba(255,255,255,0.65)", fontWeight: 700, letterSpacing: 1, textTransform: "uppercase", marginBottom: 1 }}>Macro Tracker</div>
                <div style={{ fontSize: 23, fontWeight: 900, color: "#fff" }}>{formatDate(selectedDate)}</div>
              </div>
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                {tab !== "dash" && (
                  <div style={{ textAlign: "right" }}>
                    <div style={{ fontSize: 13, color: "rgba(255,255,255,0.65)", fontWeight: 700 }}>{caloriesLeft >= 0 ? "remaining" : "over"}</div>
                    <div style={{ fontSize: 23, fontWeight: 900, color: caloriesLeft < 0 ? "#ffcdd2" : "#fff" }}>{Math.abs(Math.round(caloriesLeft))} cal</div>
                  </div>
                )}
                {/* Notification Bell */}
                <button onClick={() => { setShowNotifCenter(true); markAllRead(); }}
                  style={{ position: "relative", background: "rgba(255,255,255,0.15)", border: "none", color: "#fff", width: 38, height: 38, borderRadius: 99, fontSize: 18, cursor: "pointer", fontFamily: "inherit", display: "flex", alignItems: "center", justifyContent: "center" }}>
                  🔔
                  {(notifLog.filter(n => !n.read).length + pendingInvites.length) > 0 && (
                    <div style={{ position: "absolute", top: 2, right: 2, width: 16, height: 16, borderRadius: 99, background: C.red, fontSize: 10, fontWeight: 900, color: "#fff", display: "flex", alignItems: "center", justifyContent: "center" }}>
                      {(notifLog.filter(n => !n.read).length + pendingInvites.length) > 9 ? "9+" : notifLog.filter(n => !n.read).length + pendingInvites.length}
                    </div>
                  )}
                </button>
                {/* Dark mode toggle */}
                <button onClick={toggleDarkMode}
                  style={{ background: "rgba(255,255,255,0.15)", border: "none", color: "#fff", width: 38, height: 38, borderRadius: 99, fontSize: 16, cursor: "pointer", fontFamily: "inherit", display: "flex", alignItems: "center", justifyContent: "center" }}>
                  {darkMode ? "☀️" : "🌙"}
                </button>
                <input type="date" value={selectedDate} onChange={e => setSelectedDate(e.target.value)}
                  style={{ background: "rgba(255,255,255,0.15)", border: "1.5px solid rgba(255,255,255,0.3)", color: "#fff", borderRadius: 10, padding: "7px 10px", fontSize: 12, cursor: "pointer", fontFamily: "inherit", fontWeight: 600 }} />
              </div>
            </div>

            {/* Dashboard header expansion */}
            {tab === "dash" && (
              <div style={{ background: "rgba(255,255,255,0.12)", borderRadius: "16px 16px 0 0", padding: "16px 20px 0" }}>

                setWorkoutTab("active"); setExerciseSearch("");

              const removeExercise = ei => setActiveWorkout({...activeWorkout, exercises:activeWorkout.exercises.filter((_,i) => i!==ei)});
              const renameExercise = (ei,n) => setActiveWorkout({...activeWorkout, exercises:activeWorkout.exercises.map((ex,i) => i!==ei ? ex : {...ex,name:n})});
              const finishWorkout = () => {

                    const bestSet = ex.sets.filter(s => s.done && s.weight && s.reps)
                      .reduce((best, s) => {
                        const vol = parseFloat(s.weight) * parseInt(s.reps);
                        return vol > best.vol ? { vol, weight: s.weight, reps: s.reps } : best;
                      }, { vol: 0 });
                    if (bestSet.vol > 0) {
                      const existingPR = prs[ex.name];
                      if (!existingPR || bestSet.vol > existingPR.vol) {
                        const notifKey = ex.name + "-" + Date.now();
                        if (!prNotified[ex.name] || prNotified[ex.name] < bestSet.vol) {
                          fireNotif(
                            "🏆 New PR: " + ex.name,
                            `${bestSet.weight}lbs × ${bestSet.reps} reps — that's a personal best! 💪`,
                            "pr-" + ex.name
                          );
                          const updated = { ...prNotified, [ex.name]: bestSet.vol };
                          setPrNotified(updated);
                          localStorage.setItem("mt-pr-notified", JSON.stringify(updated));
                        }
                      }
                    }
                  });
                }
                setActiveWorkout(null); setWorkoutTab("log");
                showToast(activeWorkout.editing ? "Workout updated! ✏️" : "Workout saved! 💪");
                haptic("success");
              };
              const logCardio = () => {
                if (!cardioForm.duration) return;
                if (editingCardio) {
                  saveWorkout({...editingCardio, ...cardioForm});
                  setEditingCardio(null); showToast("Cardio updated!");
                } else if (activeWorkout) {
                  setActiveWorkout(prev => ({...prev, exercises:[...prev.exercises, {name:cardioForm.type, isCardio:true, cardioData:{...cardioForm}, sets:[{done:true}]}]}));
                  showToast(cardioForm.type + " added! 🏃");
                } else {
                  setWorkouts(prev => ({...prev, [workoutDate]:[...(prev[workoutDate]||[]), {id:Date.now(), type:"cardio", cardioType:cardioForm.type, name:cardioForm.type, date:workoutDate, ...cardioForm}]}));
                  showToast(cardioForm.type + " logged! 🏃");
                }
                setCardioForm({type:"Running",duration:"",distance:"",calories:"",notes:""});
                setShowCardioForm(false);
              };
              const saveRoutine = () => {
                if (!routineDraft.name || !routineDraft.exercises.length) return;
                setRoutines(prev => [...prev, {...routineDraft, id:Date.now()}]);
                setRoutineDraft({name:"",exercises:[]}); setShowRoutineBuilder(false); showToast("Routine saved!");
              };
              const deleteRoutine = id => setRoutines(prev => prev.filter(r => r.id!==id));
              const inputS = {...inputStyle, padding:"9px 12px", fontSize:16};

              // Render as a function returning JSX (NOT a React component) to avoid focus loss on re-render
              const renderCardioForm = () => {
                const meta = CARDIO_META[cardioForm.type];
                if (!cardioForm.type) return (
                  <div style={{background:C.card, borderRadius:16, border:"1px solid "+C.border, padding:16, marginBottom:14}}>
                    <div style={{fontSize:15, fontWeight:800, color:C.text, marginBottom:10}}>Select Activity Type</div>
                    <div style={{display:"flex", flexWrap:"wrap", gap:6}}>
                      {CARDIO_TYPES.map(t => (
                        <button key={t} onClick={() => setCardioForm(f => ({...f,type:t}))}
                          style={{padding:"9px 14px", borderRadius:99, border:"2px solid "+C.border, background:C.bg, color:C.textMid, fontWeight:700, fontSize:14, cursor:"pointer", fontFamily:"inherit"}}>
                          {CARDIO_META[t].icon} {t}
                        </button>
                      ))}
                    </div>
                  </div>
                );
                const fLabels = {duration:"Duration (min)", distance: meta.distLabel||"Distance (mi)", calories:"Calories"};
                const fPlaceholders = {duration:"30", distance: meta.distPlaceholder||"3.1", calories:"300"};
                const xLabels = {speed:"Speed (mph)", incline:"Incline (%)", watts:"Avg Watts", elevation:"Elevation (ft)", split:"Split (/500m)", spm:"Avg SPM", rounds:"Rounds"};
                const xPlaceholders = {speed:"15", incline:"2", watts:"200", elevation:"500", split:"2:00", spm:"24", rounds:"6"};
                return (
                  <div style={{background:C.card, borderRadius:16, border:"1.5px solid "+(editingCardio?C.orange:C.green), padding:16, marginBottom:14}}>
                    <div style={{display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:12}}>
                      <div style={{fontSize:17, fontWeight:800, color:C.text}}>{meta.icon} {editingCardio?"Edit ":"Log "}{cardioForm.type}</div>
                      <button onClick={() => setCardioForm(f => ({...f,type:""}))} style={{fontSize:13, color:C.blue, fontWeight:700, background:"none", border:"none", cursor:"pointer", fontFamily:"inherit"}}>Change type</button>
                    </div>
                    <div style={{display:"grid", gridTemplateColumns: meta.fields.length===3 ? "1fr 1fr 1fr" : "1fr 1fr", gap:8, marginBottom:10}}>
                      {meta.fields.map(k => (
                        <div key={k}>
                          <label style={{fontSize:13, color:C.textMid, fontWeight:700, display:"block", marginBottom:4}}>{fLabels[k]}</label>
                          <input type="number" placeholder={fPlaceholders[k]} value={cardioForm[k]||""} onChange={e => setCardioForm(cf => ({...cf,[k]:e.target.value}))} style={inputS} />
                        </div>
                      ))}
                    </div>
                    {meta.extra.length > 0 && (
                      <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:10}}>
                        {meta.extra.map(k => (
                          <div key={k}>
                            <label style={{fontSize:13, color:C.textMid, fontWeight:700, display:"block", marginBottom:4}}>{xLabels[k]}</label>
                            <input type={k==="split"?"text":"number"} placeholder={xPlaceholders[k]} value={cardioForm[k]||""} onChange={e => setCardioForm(f => ({...f,[k]:e.target.value}))} style={inputS} />
                          </div>
                        ))}
                      </div>
                    )}
                    <input placeholder="Notes (optional)" value={cardioForm.notes||""} onChange={e => setCardioForm(f => ({...f,notes:e.target.value}))} style={{...inputS, width:"100%", marginBottom:10}} />
                    <div style={{display:"flex", gap:8}}>
                      <button onClick={() => { setShowCardioForm(false); setEditingCardio(null); setCardioForm({type:"Running",duration:"",distance:"",calories:"",notes:""}); }}
                        style={{flex:1, padding:"11px", borderRadius:12, border:"1.5px solid "+C.border, background:C.bg, color:C.textMid, fontWeight:700, cursor:"pointer", fontFamily:"inherit"}}>Cancel</button>
                      <button onClick={logCardio} style={{flex:2, padding:"11px", borderRadius:12, border:"none", background:editingCardio?C.orange:C.green, color:"#fff", fontWeight:800, fontSize:16, cursor:"pointer", fontFamily:"inherit"}}>
                        {editingCardio ? "Save Changes" : "Save "+cardioForm.type}
                      </button>
                    </div>
                  </div>
                );
              };

              if (workoutTab === "active" && activeWorkout) {
                const elapsed = activeWorkout.editing
                  ? (activeWorkout.endTime ? Math.round((activeWorkout.endTime-activeWorkout.startTime)/60000) : "?")
                  : Math.round((Date.now()-activeWorkout.startTime)/60000);
                const groupedEx = Object.entries(EXERCISES).map(([g,exs]) => ({g, exs:exs.filter(e => e.toLowerCase().includes(exerciseSearch.toLowerCase()))})).filter(x => x.exs.length>0);
                return (
                  <div style={{animation:"fadeIn 0.2s ease"}}>
                    <div style={{background:C.card, borderRadius:16, border:"1.5px solid "+(activeWorkout.editing?C.orange:C.border), padding:16, marginBottom:14, boxShadow:"0 1px 4px rgba(0,0,0,0.04)"}}>
                      {activeWorkout.editing && <div style={{fontSize:13, color:C.orange, fontWeight:800, marginBottom:6, textTransform:"uppercase"}}>✏️ Editing Workout</div>}
                      <div style={{display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:8}}>
                        <input value={activeWorkout.name} onChange={e => setActiveWorkout({...activeWorkout,name:e.target.value})}
                          style={{...inputS, flex:1, fontWeight:800, fontSize:18, border:"none", background:"transparent", padding:0, marginRight:10}} />
                        <div style={{fontSize:14, color:C.textLight, fontWeight:700, whiteSpace:"nowrap"}}>⏱ {elapsed}m</div>
                      </div>
                      <div style={{display:"flex", gap:8}}>
                        <button onClick={finishWorkout} style={{flex:2, padding:"11px", borderRadius:12, border:"none", background:activeWorkout.editing?C.orange:C.green, color:"#fff", fontWeight:800, fontSize:16, cursor:"pointer", fontFamily:"inherit"}}>
                          {activeWorkout.editing ? "✓ Save Changes" : "✓ Finish Workout"}
                        </button>
                        <button onClick={() => { if (!activeWorkout.editing) saveWorkout(activeWorkout); setActiveWorkout(null); setWorkoutTab("log"); }}
                          style={{flex:1, padding:"11px", borderRadius:12, border:"1.5px solid "+C.border, background:C.bg, color:C.textMid, fontWeight:700, fontSize:15, cursor:"pointer", fontFamily:"inherit"}}>
                          {activeWorkout.editing ? "Cancel" : "Save Draft"}
                        </button>
                      </div>
                    </div>

                    {showCardioForm && renderCardioForm()}

                    {activeWorkout.exercises.map((ex, exIdx) => {
                      if (ex.isCardio) {
                        const cm = CARDIO_META[ex.name] || {icon:"🏃"};
                        const cd = ex.cardioData || {};
                        return (
                          <div key={exIdx} style={{background:C.card, borderRadius:16, border:"1.5px solid "+C.green+"33", padding:14, marginBottom:12}}>
                            <div style={{display:"flex", alignItems:"center", justifyContent:"space-between"}}>
                              <div>
                                <div style={{fontSize:17, fontWeight:800, color:C.text}}>{cm.icon} {ex.name}</div>
                                <div style={{fontSize:14, color:C.textLight, fontWeight:600, marginTop:2}}>
                                  {cd.duration?cd.duration+" min":""}{cd.distance?" · "+cd.distance+(ex.name==="Indoor Rowing"?"m":" mi"):""}{cd.calories?" · "+cd.calories+" cal":""}{cd.speed?" · "+cd.speed+" mph":""}{cd.rounds?" · "+cd.rounds+" rounds":""}
                                </div>
                              </div>
                              <div style={{display:"flex", gap:6, alignItems:"center"}}>
                                <span style={{fontSize:12, fontWeight:800, color:C.green, background:C.greenLight, padding:"3px 8px", borderRadius:99}}>CARDIO</span>
                                <button onClick={() => removeExercise(exIdx)} style={{background:C.border, border:"none", color:C.textLight, width:26, height:26, borderRadius:99, fontSize:16, cursor:"pointer", fontFamily:"inherit"}}>×</button>
                              </div>
                            </div>
                          </div>
                        );
                      }
                      const pr = prs[ex.name];
                      return (
                        <div key={exIdx} style={{background:C.card, borderRadius:16, border:"1px solid "+C.border, padding:16, marginBottom:12, boxShadow:"0 1px 4px rgba(0,0,0,0.04)"}}>
                          <div style={{display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:10}}>
                            <div style={{flex:1, marginRight:8}}>
                              <input value={ex.name} onChange={e => renameExercise(exIdx, e.target.value)}
                                style={{...inputS, border:"none", background:"transparent", padding:0, fontWeight:800, fontSize:17, color:C.text, width:"100%"}} />
                              {pr && <div style={{fontSize:13, color:C.orange, fontWeight:700}}>🏆 PR: {pr.weight}lb × {pr.reps}</div>}
                            </div>
                            <button onClick={() => removeExercise(exIdx)} style={{background:C.border, border:"none", color:C.textLight, width:28, height:28, borderRadius:99, fontSize:17, cursor:"pointer", fontFamily:"inherit", flexShrink:0}}>×</button>
                          </div>
                          <div style={{display:"grid", gridTemplateColumns:"28px 1fr 1fr 36px", gap:6, marginBottom:6}}>
                            {["Set","lbs","Reps",""].map((h,i) => <div key={i} style={{fontSize:12, fontWeight:800, color:C.textLight, textAlign:"center", textTransform:"uppercase"}}>{h}</div>)}
                          </div>
                          {ex.sets.map((s, sIdx) => (
                            <div key={sIdx} style={{display:"grid", gridTemplateColumns:"28px 1fr 1fr 36px", gap:6, marginBottom:6, alignItems:"center"}}>
                              <div style={{fontSize:14, fontWeight:800, color:s.done?C.green:C.textLight, textAlign:"center", background:s.done?C.greenLight:C.bg, borderRadius:8, padding:"8px 2px"}}>{sIdx+1}</div>
                              <input type="number" placeholder="135" value={s.weight} onChange={e => updateSet(exIdx,sIdx,"weight",e.target.value)} style={{...inputS, textAlign:"center"}} />
                              <input type="number" placeholder="10" value={s.reps} onChange={e => updateSet(exIdx,sIdx,"reps",e.target.value)} style={{...inputS, textAlign:"center"}} />
                              <button onClick={() => (s.weight&&s.reps) ? updateSet(exIdx,sIdx,"done",!s.done) : removeSet(exIdx,sIdx)}
                                style={{height:36, borderRadius:10, border:"none", background:s.done?C.green:((s.weight&&s.reps)?C.blue:C.border), color:(s.done||(s.weight&&s.reps))?"#fff":C.textLight, fontWeight:800, fontSize:15, cursor:"pointer", fontFamily:"inherit"}}>
                                {s.done?"✓":((s.weight&&s.reps)?"✓":"×")}
                              </button>
                            </div>
                          ))}
                          <button onClick={() => addSet(exIdx)} style={{width:"100%", padding:"8px", borderRadius:10, border:"1.5px dashed "+C.border, background:"transparent", color:C.blue, fontWeight:700, fontSize:15, cursor:"pointer", marginTop:4, fontFamily:"inherit"}}>
                            + Add Set
                          </button>
                        </div>
                      );
                    })}

                    {!showExercisePicker && !showCardioForm && (
                      <button onClick={() => setShowExercisePicker(true)} style={{width:"100%", padding:"13px", borderRadius:14, border:"2px dashed "+C.blue, background:C.blueLight, color:C.blue, fontWeight:800, fontSize:17, cursor:"pointer", fontFamily:"inherit", marginBottom:12}}>
                        + Add Exercise or Cardio
                      </button>
                    )}
                    {showExercisePicker && (
                      <div style={{background:C.card, borderRadius:16, border:"1px solid "+C.border, padding:16, marginBottom:12}}>
                        <div style={{display:"flex", gap:8, marginBottom:12}}>
                          <input placeholder="Search exercises, cardio..." value={exerciseSearch} onChange={e => setExerciseSearch(e.target.value)} style={{...inputS, flex:1}} autoFocus />
                          <button onClick={() => { setShowExercisePicker(false); setExerciseSearch(""); }} style={{padding:"9px 14px", borderRadius:10, border:"1px solid "+C.border, background:C.bg, color:C.textMid, fontWeight:700, cursor:"pointer", fontFamily:"inherit"}}>✕</button>
                        </div>
                        <div style={{maxHeight:300, overflowY:"auto"}}>
                          {groupedEx.map(({g, exs}) => (
                            <div key={g} style={{marginBottom:10}}>
                              <div style={{fontSize:12, fontWeight:800, color:g==="Cardio 🏃"?C.green:C.textLight, textTransform:"uppercase", letterSpacing:1, marginBottom:6, paddingLeft:4}}>{g}</div>
                              {exs.map(e => {
                                const isCa = !!CARDIO_META[e];
                                return (
                                  <button key={e} onClick={() => addExerciseToActive(e)}
                                    style={{display:"flex", alignItems:"center", justifyContent:"space-between", width:"100%", textAlign:"left", padding:"10px 12px", marginBottom:4, borderRadius:10, border:"1px solid "+C.border, background:C.bg, color:C.text, fontWeight:700, fontSize:16, cursor:"pointer", fontFamily:"inherit"}}>
                                    <div style={{display:"flex", alignItems:"center", gap:8}}>
                                      {isCa && <span>{CARDIO_META[e].icon}</span>}
                                      <span>{e}</span>
                                    </div>
                                    {isCa && <span style={{fontSize:11, fontWeight:800, color:C.green, background:C.greenLight, padding:"2px 6px", borderRadius:99}}>CARDIO</span>}
                                  </button>
                                );
                              })}
                            </div>
                          ))}
                        </div>
                      </div>
                    )}

                    <div style={{background:C.card, borderRadius:14, border:"1px solid "+C.border, padding:14, marginBottom:16}}>
                      <label style={{fontSize:14, color:C.textMid, fontWeight:700, display:"block", marginBottom:6}}>Workout Notes</label>
                      <textarea value={activeWorkout.notes} onChange={e => setActiveWorkout({...activeWorkout,notes:e.target.value})}
                        placeholder="How did it feel? Any notes..."
                        style={{...inputS, width:"100%", minHeight:70, resize:"vertical", fontFamily:"inherit"}} />
                    </div>
                  </div>
                );
              }

              return (
                <div style={{animation:"fadeIn 0.2s ease"}}>
                  <div style={{display:"flex", background:C.border, borderRadius:12, padding:3, marginBottom:16}}>
                    {[["log","📅 Today"],["history","📊 History"],["routines","📋 Routines"],["prs","🏆 PRs"]].map(([t,label]) => (
                      <button key={t} onClick={() => setWorkoutTab(t)}
                        style={{flex:1, padding:"8px 4px", borderRadius:10, fontSize:13, fontWeight:800, border:"none", cursor:"pointer", fontFamily:"inherit", transition:"all 0.2s", background:workoutTab===t?C.card:"transparent", color:workoutTab===t?C.blue:C.textLight, boxShadow:workoutTab===t?"0 2px 8px rgba(0,0,0,0.1)":"none"}}>
                        {label}
                      </button>
                    ))}
                  </div>

                  {workoutTab === "log" && (
                    <div>
                      <div style={{display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:14}}>
                        <div style={{fontSize:17, fontWeight:800, color:C.text}}>{formatDate(workoutDate)}</div>
                        <input type="date" value={workoutDate} onChange={e => setWorkoutDate(e.target.value)}
                          style={{background:C.card, border:"1.5px solid "+C.border, borderRadius:10, padding:"6px 10px", fontSize:14, cursor:"pointer", fontFamily:"inherit", fontWeight:600, color:C.text}} />
                      </div>
                      <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:12}}>
                        <button onClick={() => startLifting()} style={{padding:"14px 8px", borderRadius:14, border:"none", background:C.blue, color:"#fff", fontWeight:800, fontSize:15, cursor:"pointer", fontFamily:"inherit", display:"flex", flexDirection:"column", alignItems:"center", gap:5}}>
                          <span style={{fontSize:24}}>🏋️</span>Full Workout
                        </button>
                        <button onClick={() => { setExerciseSearch(""); setWorkoutTab("quickadd"); }} style={{padding:"14px 8px", borderRadius:14, border:"none", background:C.purple, color:"#fff", fontWeight:800, fontSize:15, cursor:"pointer", fontFamily:"inherit", display:"flex", flexDirection:"column", alignItems:"center", gap:5}}>
                          <span style={{fontSize:24}}>🔍</span>Find Activity
                        </button>
                      </div>
                      {routines.length > 0 && (
                        <div style={{marginBottom:14}}>
                          <div style={{fontSize:14, fontWeight:800, color:C.textMid, textTransform:"uppercase", letterSpacing:0.5, marginBottom:8}}>Quick Start Routine</div>
                          <div style={{display:"flex", gap:8, flexWrap:"wrap"}}>
                            {routines.map(r => (
                              <button key={r.id} onClick={() => startLifting(r)}
                                style={{padding:"9px 14px", borderRadius:10, border:"1.5px solid "+C.blue, background:C.blueLight, color:C.blue, fontWeight:800, fontSize:15, cursor:"pointer", fontFamily:"inherit"}}>
                                {r.name}
                              </button>
                            ))}
                          </div>
                        </div>
                      )}
                      {showCardioForm && renderCardioForm()}
                      {dayWorkouts.length === 0 ? (
                        <div style={{textAlign:"center", padding:"40px 20px", color:C.textLight}}>
                          <div style={{fontSize:48, marginBottom:12}}>🏋️</div>
                          <div style={{fontSize:18, fontWeight:800, color:C.textMid, marginBottom:6}}>No workouts logged</div>
                          <div style={{fontSize:15}}>Start a session or find an activity above</div>
                        </div>
                      ) : dayWorkouts.map(w => (
                        <div key={w.id} style={{background:C.card, borderRadius:16, border:"1px solid "+C.border, padding:16, marginBottom:12, boxShadow:"0 1px 4px rgba(0,0,0,0.04)"}}>
                          <div style={{display:"flex", alignItems:"flex-start", justifyContent:"space-between", marginBottom:8}}>
                            <div style={{flex:1}}>
                              <div style={{fontSize:17, fontWeight:800, color:C.text}}>
                                {w.type==="cardio" ? ((CARDIO_META[w.cardioType||"Other"]||{icon:"🏃"}).icon+" "+(w.cardioType||w.name||"Cardio")) : ("🏋️ "+(w.name||"Workout"))}
                              </div>
                              {(w.type==="workout"||w.type==="lifting") && (
                                <div style={{fontSize:13, color:C.textLight, fontWeight:600}}>
                                  {w.endTime ? Math.round((w.endTime-w.startTime)/60000)+" min · " : "In progress · "}
                                  {(w.exercises||[]).filter(e=>!e.isCardio).length} exercises
                                  {(w.exercises||[]).filter(e=>e.isCardio).length>0 ? " · "+(w.exercises||[]).filter(e=>e.isCardio).length+" cardio" : ""}
                                  {" · "+(w.exercises||[]).filter(e=>!e.isCardio).reduce((a,e)=>a+e.sets.filter(s=>s.done).length,0)+" sets"}
                                </div>
                              )}
                              {w.type==="cardio" && (
                                <div style={{fontSize:13, color:C.textLight, fontWeight:600}}>
                                  {w.duration?w.duration+" min":""}{w.distance?" · "+w.distance+" mi":""}{w.calories?" · "+w.calories+" cal":""}
                                </div>
                              )}
                            </div>
                            <div style={{display:"flex", gap:6, flexShrink:0, marginLeft:8}}>
                              <button onClick={() => {
                                if (w.type==="workout"||w.type==="lifting") { editExistingWorkout(w); }
                                else { setEditingCardio(w); setCardioForm({type:w.cardioType||w.type||"Running",duration:w.duration||"",distance:w.distance||"",calories:w.calories||"",notes:w.notes||""}); setShowCardioForm(true); }
                              }} style={{background:C.blueLight, border:"none", color:C.blue, width:30, height:30, borderRadius:8, fontSize:16, cursor:"pointer", fontFamily:"inherit"}}>✏️</button>
                              <button onClick={() => deleteWorkout(w.id)} style={{background:C.border, border:"none", color:C.textLight, width:30, height:30, borderRadius:8, fontSize:16, cursor:"pointer", fontFamily:"inherit"}}>×</button>
                            </div>
                          </div>
                          {(w.type==="workout"||w.type==="lifting") && (w.exercises||[]).map((ex,i) => (
                            <div key={i} style={{fontSize:14, color:C.textMid, marginBottom:3, paddingLeft:4}}>
                              {ex.isCardio ? (
                                <span><span style={{fontWeight:700}}>{(CARDIO_META[ex.name]||{icon:"🏃"}).icon} {ex.name}</span><span style={{color:C.textLight}}>{ex.cardioData&&ex.cardioData.duration?" — "+ex.cardioData.duration+" min":""}</span></span>
                              ) : (
                                <span><span style={{fontWeight:700}}>{ex.name}</span><span style={{color:C.textLight}}>{ex.sets.filter(s=>s.done&&s.weight&&s.reps).map(s=>" "+s.weight+"×"+s.reps).join(",")||" — "+ex.sets.filter(s=>s.done).length+" sets"}</span></span>
                              )}
                            </div>
                          ))}
                          {w.notes && <div style={{marginTop:8, fontSize:14, color:C.textLight, fontStyle:"italic"}}>{w.notes}</div>}
                        </div>
                      ))}
                    </div>
                  )}

                  {workoutTab === "quickadd" && (
                    <div>
                      <div style={{display:"flex", alignItems:"center", gap:10, marginBottom:12}}>
                        <button onClick={() => { setWorkoutTab("log"); setExerciseSearch(""); }} style={{background:C.bg, border:"1px solid "+C.border, borderRadius:10, padding:"8px 14px", fontWeight:700, fontSize:15, color:C.textMid, cursor:"pointer", fontFamily:"inherit"}}>← Back</button>
                        <div style={{fontSize:17, fontWeight:800, color:C.text}}>Find Activity</div>
                      </div>
                      <div style={{position:"relative", marginBottom:12}}>
                        <div style={{position:"absolute", left:12, top:"50%", transform:"translateY(-50%)", fontSize:17, pointerEvents:"none"}}>🔍</div>
                        <input placeholder="Search cardio, strength, boxing..." value={exerciseSearch} onChange={e => setExerciseSearch(e.target.value)} style={{...inputStyle, paddingLeft:38}} autoFocus />

                                  </div>
                                )}

                                  <div style={{fontSize:12, fontWeight:800, padding:"3px 8px", borderRadius:99, background:leading==="you"?C.greenLight:leading==="tied"?C.orangeLight:C.redLight, color:leading==="you"?C.green:leading==="tied"?C.orange:C.red}}>

                                {first && first[s.key] && (
                                  <div style={{ fontSize: 10, color: parseFloat(latest[s.key]) < parseFloat(first[s.key]) ? C.green : C.red, fontWeight: 700 }}>

                      )}
                    </div>

                      const photo = { id: Date.now(), date: todayKey(), dataUrl: ev.target.result, note: "" };

                      localStorage.setItem("mt-progress-photos", JSON.stringify(updated));

                      <div style={{ display: "flex", gap: 8 }}>

                          <button key={v} onClick={() => setCalc(c => ({...c, sex: v}))}
                            style={{ flex: 1, padding: "11px", borderRadius: 12, border: calc.sex === v ? `2px solid ${C.blue}` : `2px solid ${C.border}`, background: calc.sex === v ? C.blueLight : C.bg, color: calc.sex === v ? C.blue : C.textMid, fontWeight: 800, fontSize: 14, cursor: "pointer", fontFamily: "inherit" }}>
                            {label}
                          </button>
                        ))}
                      </div>
                    </div>

                    {/* Age + Height */}
                    <div style={{ background: C.card, borderRadius: 16, border: `1px solid ${C.border}`, padding: 16, marginBottom: 12, boxShadow: "0 1px 4px rgba(0,0,0,0.04)" }}>
                      <div style={{ fontSize: 12, fontWeight: 800, color: C.textMid, textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 12 }}>Basic Info</div>
                      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 12 }}>
                        <div>
                          <label style={{ fontSize: 12, color: C.textMid, display: "block", marginBottom: 6, fontWeight: 700 }}>Age</label>
                          <input type="number" min="10" max="100" placeholder="e.g. 30" value={calc.age}
                            onChange={e => setCalc(c => ({...c, age: e.target.value}))} style={inputStyle} />
                        </div>
                        <div>
                          <label style={{ fontSize: 12, color: C.textMid, display: "block", marginBottom: 6, fontWeight: 700 }}>Unit System</label>
                          <div style={{ display: "flex", background: C.border, borderRadius: 10, overflow: "hidden" }}>
                            {[["imperial","lbs/ft"], ["metric","kg/cm"]].map(([v, label]) => (
                              <button key={v} onClick={() => setCalc(c => ({...c, unit: v}))}
                                style={{ flex: 1, padding: "11px 6px", border: "none", cursor: "pointer", fontSize: 11, fontWeight: 800, fontFamily: "inherit", transition: "all 0.15s",

                        {calc.unit === "imperial" ? (

                          <div style={{ fontSize: 13, color: C.textLight, textAlign: "center", marginTop: 3, fontWeight: 600 }}>{calc.unit === "imperial" ? "lbs" : "kg"}</div>

                        return <div style={{ marginTop: 10, fontSize: 12, fontWeight: 700, color: diff < 0 ? C.blue : C.orange, textAlign: "center" }}>
                          {diff < 0 ? `📉 Lose ${Math.abs(diff).toFixed(1)} ${unit}` : `📈 Gain ${Math.abs(diff).toFixed(1)} ${unit}`}
                        </div>;

                      <input type="number" min="3" max="60" placeholder="e.g. 20" value={calc.bodyFat}
                        onChange={e => setCalc(c => ({...c, bodyFat: e.target.value}))} style={inputStyle} />

                      {[
                        ["balanced",    "⚖️ Balanced",       "40% carbs · 30% protein · 30% fat", 40, 30, 30],
                        ["highprotein", "💪 High Protein",   "30% carbs · 40% protein · 30% fat", 30, 40, 30],
                        ["lowcarb",     "🥩 Low Carb",       "20% carbs · 40% protein · 40% fat", 20, 40, 40],
                        ["keto",        "🥑 Keto",           "5% carbs · 25% protein · 70% fat",  5,  25, 70],
                        ["custom",      "✏️ Custom",         "Set your own percentages",            0,  0,  0],
                      ].map(([v, label, desc]) => (
                        <button key={v} onClick={() => setCalc(c => ({...c, macroSplit: v}))}
                          style={{ display: "flex", alignItems: "center", width: "100%", padding: "11px 12px", marginBottom: 8, borderRadius: 12, cursor: "pointer", fontFamily: "inherit", textAlign: "left", transition: "all 0.15s",
                            border: calc.macroSplit === v ? `2px solid ${C.blue}` : `2px solid ${C.border}`,
                            background: calc.macroSplit === v ? C.blueLight : C.bg }}>
                          <div style={{ flex: 1 }}>
                            <div style={{ fontSize: 13, fontWeight: 800, color: calc.macroSplit === v ? C.blue : C.text }}>{label}</div>
