    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      background: #f4f6f9;
      color: #1a1a2e;
      font-family: 'Nunito', 'Segoe UI', sans-serif;
      min-height: 100vh;
    }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
    input[type="date"]::-webkit-calendar-picker-indicator { filter: none; opacity: 0.5; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #f4f6f9; }
    ::-webkit-scrollbar-thumb { background: #d0d5e0; border-radius: 99px; }
    input:focus { outline: none; border-color: #4A90D9 !important; box-shadow: 0 0 0 3px rgba(74,144,217,0.12); }
    button:active { transform: scale(0.97); }
    @keyframes slideDown { from { opacity:0; transform:translateY(-8px);} to { opacity:1; transform:translateY(0);} }

            </svg>
            <div style={{ position: "absolute", inset: 0, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>
              <div style={{ fontSize: 13, fontWeight: 800, color: over ? C.red : C.text, lineHeight: 1 }}>{Math.round(value)}</div>
              <div style={{ fontSize: 9, color: C.textLight, fontWeight: 600 }}>{unit || "g"}</div>
            </div>
          </div>
          <div style={{ fontSize: 11, fontWeight: 700, color: C.textMid, textTransform: "uppercase", letterSpacing: 0.5 }}>{label}</div>
          <div style={{ fontSize: 10, color: C.textLight }}>{goal}{unit || "g"}</div>
        </div>
      );
    }

    function MacroBar({ label, value, goal, color }) {
      const pct = Math.min((value / goal) * 100, 100);
      const over = value > goal;
      const left = goal - value;
      return (
        <div style={{ marginBottom: 12 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 5 }}>
            <span style={{ fontSize: 13, fontWeight: 700, color: C.textMid }}>{label}</span>
            <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
              <span style={{ fontSize: 12, color: C.textLight }}>{Math.round(value)}g</span>
              <span style={{ fontSize: 11, color: C.textLight }}>·</span>
              <span style={{ fontSize: 12, fontWeight: 700, color: over ? C.red : C.green }}>
                {over ? `${Math.round(Math.abs(left))}g over` : `${Math.round(left)}g left`}
              </span>
            </div>
          </div>
          <div style={{ height: 7, background: C.border, borderRadius: 99, overflow: "hidden" }}>
            <div style={{ height: "100%", width: `${pct}%`, borderRadius: 99, background: over ? C.red : color, transition: "width 0.5s ease" }} />
          </div>
        </div>
      );
    }

    function App() {
      const [tab, setTab] = useState("dash");
      const [goals, setGoals] = useState(emptyGoals);
      const [entries, setEntries] = useState({});
      const [form, setForm] = useState({ name: "", calories: "", protein: "", carbs: "", fat: "", meal: "Breakfast", qty: 1 });
      const [weightMode, setWeightMode] = useState(false);
      const [weightUnit, setWeightUnit] = useState("g");
      const [weightAmount, setWeightAmount] = useState("");
      const [per100, setPer100] = useState({ calories: "", protein: "", carbs: "", fat: "" });
      const [searchQuery, setSearchQuery] = useState("");
      const [showPresets, setShowPresets] = useState(false);
      const [editGoals, setEditGoals] = useState(false);
      const [goalDraft, setGoalDraft] = useState(emptyGoals);
      const [selectedDate, setSelectedDate] = useState(todayKey());
      const [toast, setToast] = useState(null);
      const [goalsSubTab, setGoalsSubTab] = useState("view");
      const [weightLog, setWeightLog] = useState({});
      const [weightEntry, setWeightEntry] = useState("");
      const [bodyWeightUnit, setBodyWeightUnit] = useState("lbs");
      const [editingWeightDate, setEditingWeightDate] = useState(null);
      const [editingWeightVal, setEditingWeightVal] = useState("");
      const [workoutTab, setWorkoutTab] = useState("log");
      const [workouts, setWorkouts] = useState({});
      const [routines, setRoutines] = useState([]);
      const [activeWorkout, setActiveWorkout] = useState(null);
      const [workoutDate, setWorkoutDate] = useState(todayKey());
      const [showExercisePicker, setShowExercisePicker] = useState(false);
      const [exerciseSearch, setExerciseSearch] = useState("");
      const [showRoutineBuilder, setShowRoutineBuilder] = useState(false);
      const [routineDraft, setRoutineDraft] = useState({ name: "", exercises: [] });
      const [showCardioForm, setShowCardioForm] = useState(false);
      const [cardioForm, setCardioForm] = useState({ type: "Running", duration: "", distance: "", calories: "", notes: "" });
      const [editingWorkout, setEditingWorkout] = useState(null);
      const [editingCardio, setEditingCardio] = useState(null);
      const [calc, setCalc] = useState({
        sex: "male", age: "", unit: "imperial",
        heightFt: "", heightIn: "", heightCm: "",
        currentWeight: "", goalWeight: "", bodyFat: "",
        activity: "moderate", macroSplit: "balanced",
        customCarbs: "", customProtein: "", customFat: "",
      });

      useEffect(() => {
        try {
          const stored = localStorage.getItem(STORAGE_KEY);
          if (stored) {
            const d = JSON.parse(stored);
            if (d.goals) setGoals(d.goals);
            if (d.entries) setEntries(d.entries);
            if (d.workouts) setWorkouts(d.workouts);
            if (d.routines) setRoutines(d.routines);
            if (d.weightLog) setWeightLog(d.weightLog);
            if (d.bodyWeightUnit) setBodyWeightUnit(d.bodyWeightUnit);
          }
        } catch {}
      }, []);

      useEffect(() => {
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify({ goals, entries, workouts, routines, weightLog, bodyWeightUnit })); } catch {}
      }, [goals, entries, workouts, routines, weightLog, bodyWeightUnit]);

      const showToast = (msg, type="success") => {
        setToast({ msg, type });
        setTimeout(() => setToast(null), 2200);
      };

      const dayEntries = entries[selectedDate] || [];
      const totals = dayEntries.reduce(
        (acc, e) => ({ calories: acc.calories + e.calories * e.qty, protein: acc.protein + e.protein * e.qty, carbs: acc.carbs + e.carbs * e.qty, fat: acc.fat + e.fat * e.qty }),
        { calories: 0, protein: 0, carbs: 0, fat: 0 }
      );

      const addEntry = () => {
        let cal, pro, carb, fat, entryName;
        if (weightMode) {
          if (!form.name || !weightAmount || !per100.calories) return;
          const grams = weightUnit === "oz" ? parseFloat(weightAmount) * 28.3495 : parseFloat(weightAmount);
          const ratio = grams / 100;
          cal = (parseFloat(per100.calories)||0) * ratio;
          pro = (parseFloat(per100.protein)||0) * ratio;
          carb = (parseFloat(per100.carbs)||0) * ratio;
          fat = (parseFloat(per100.fat)||0) * ratio;
          entryName = `${form.name} (${parseFloat(weightAmount)}${weightUnit})`;
        } else {
          if (!form.name || !form.calories) return;
          cal = parseFloat(form.calories)||0;
          pro = parseFloat(form.protein)||0;
          carb = parseFloat(form.carbs)||0;
          fat = parseFloat(form.fat)||0;
          entryName = form.name;
        }
        const entry = { id: Date.now(), name: entryName, calories: cal, protein: pro, carbs: carb, fat, meal: form.meal, qty: weightMode ? 1 : (parseFloat(form.qty)||1) };
        setEntries(prev => ({ ...prev, [selectedDate]: [...(prev[selectedDate]||[]), entry] }));
        setForm({ name: "", calories: "", protein: "", carbs: "", fat: "", meal: form.meal, qty: 1 });
        setPer100({ calories: "", protein: "", carbs: "", fat: "" });
        setWeightAmount("");
        setSearchQuery("");
        setShowPresets(false);
        showToast(`Added ${entryName}`);
        setTab("log");
      };

      const removeEntry = (id) => setEntries(prev => ({ ...prev, [selectedDate]: (prev[selectedDate]||[]).filter(e => e.id !== id) }));

      const selectPreset = (p) => {
        if (weightMode) {
          setForm(f => ({ ...f, name: p.name }));
          setPer100({ calories: p.calories, protein: p.protein, carbs: p.carbs, fat: p.fat });
        } else {
          setForm(f => ({ ...f, name: p.name, calories: p.calories, protein: p.protein, carbs: p.carbs, fat: p.fat }));
        }
        setShowPresets(false);
        setSearchQuery("");
      };

      const saveGoals = () => { setGoals(goalDraft); setEditGoals(false); showToast("Goals saved!"); };

      const mealGroups = MEAL_TYPES.map(m => ({ meal: m, items: dayEntries.filter(e => e.meal === m) })).filter(g => g.items.length > 0);
      const filtered = PRESET_FOODS.filter(p => p.name.toLowerCase().includes(searchQuery.toLowerCase()));
      const caloriesLeft = goals.calories - totals.calories;
      const calPct = Math.min((totals.calories / goals.calories) * 100, 100);
      const isToday = selectedDate === todayKey();

      const formatDate = (d) => {
        const date = new Date(d + "T12:00:00");
        if (d === todayKey()) return "Today";
        return date.toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric" });
      };

      return (
        <div style={{ minHeight: "100vh", background: C.bg, display: "flex", flexDirection: "column", maxWidth: 480, margin: "0 auto", paddingBottom: 80 }}>

          {/* Toast */}
          {toast && (
            <div style={{ position: "fixed", top: 16, left: "50%", transform: "translateX(-50%)", background: toast.type === "success" ? C.green : C.red, color: "#fff", padding: "10px 20px", borderRadius: 99, fontSize: 13, fontWeight: 700, zIndex: 999, whiteSpace: "nowrap", boxShadow: "0 4px 20px rgba(0,0,0,0.15)", animation: "slideDown 0.2s ease" }}>
              ✓ {toast.msg}
            </div>
          )}

          {/* Header */}
          <div style={{ background: C.blue, padding: "20px 20px 0" }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: tab === "dash" ? 16 : 12 }}>
              <div>
                <div style={{ fontSize: 10, color: "rgba(255,255,255,0.65)", fontWeight: 700, letterSpacing: 1, textTransform: "uppercase", marginBottom: 1 }}>Macro Tracker</div>
                <div style={{ fontSize: 20, fontWeight: 900, color: "#fff" }}>{formatDate(selectedDate)}</div>
              </div>
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                {tab !== "dash" && (
                  <div style={{ textAlign: "right" }}>
                    <div style={{ fontSize: 10, color: "rgba(255,255,255,0.65)", fontWeight: 700 }}>{caloriesLeft >= 0 ? "remaining" : "over"}</div>
                    <div style={{ fontSize: 20, fontWeight: 900, color: caloriesLeft < 0 ? "#ffcdd2" : "#fff" }}>{Math.abs(Math.round(caloriesLeft))} cal</div>
                  </div>
                )}
                <input type="date" value={selectedDate} onChange={e => setSelectedDate(e.target.value)}
                  style={{ background: "rgba(255,255,255,0.15)", border: "1.5px solid rgba(255,255,255,0.3)", color: "#fff", borderRadius: 10, padding: "7px 10px", fontSize: 12, cursor: "pointer", fontFamily: "inherit", fontWeight: 600 }} />
              </div>
            </div>

            {/* Dashboard header expansion */}
            {tab === "dash" && (
              <div style={{ background: "rgba(255,255,255,0.12)", borderRadius: "16px 16px 0 0", padding: "16px 20px 0" }}>
                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 12 }}>
                  <div>
                    <div style={{ fontSize: 10, color: "rgba(255,255,255,0.65)", fontWeight: 700, textTransform: "uppercase", letterSpacing: 0.5 }}>Calories Today</div>
                    <div style={{ display: "flex", alignItems: "baseline", gap: 5 }}>
                      <span style={{ fontSize: 38, fontWeight: 900, color: "#fff", lineHeight: 1 }}>{Math.round(totals.calories)}</span>
                      <span style={{ fontSize: 13, color: "rgba(255,255,255,0.55)", fontWeight: 600 }}>/ {goals.calories}</span>
                    </div>
                  </div>
                  <div style={{ textAlign: "right" }}>
                    <div style={{ fontSize: 10, color: "rgba(255,255,255,0.65)", fontWeight: 700, textTransform: "uppercase", letterSpacing: 0.5 }}>{caloriesLeft >= 0 ? "Remaining" : "Over"}</div>
                    <div style={{ fontSize: 26, fontWeight: 900, color: caloriesLeft < 0 ? "#ffcdd2" : "#fff", lineHeight: 1.1 }}>{Math.abs(Math.round(caloriesLeft))}</div>
                  </div>
                </div>
                <div style={{ height: 5, background: "rgba(255,255,255,0.2)", borderRadius: 99, overflow: "hidden", marginBottom: 16 }}>
                  <div style={{ height: "100%", width: `${calPct}%`, background: caloriesLeft < 0 ? "#ffcdd2" : "rgba(255,255,255,0.9)", borderRadius: 99, transition: "width 0.5s ease" }} />
                </div>
                <div style={{ display: "flex", justifyContent: "space-around", paddingBottom: 14 }}>
                  <MacroCircle value={totals.protein} goal={goals.protein} color="#fff" label="Protein" />
                  <MacroCircle value={totals.carbs} goal={goals.carbs} color="#fff" label="Carbs" />
                  <MacroCircle value={totals.fat} goal={goals.fat} color="#fff" label="Fat" />
                </div>
              </div>
            )}
          </div>

          {/* Tab bar */}
          <div style={{ background: C.card, borderBottom: `1px solid ${C.border}`, display: "flex", padding: "0 4px" }}>
            {[["dash", "🏠", "Home"], ["log", "📋", "Log"], ["add", "➕", "Add"], ["workout", "💪", "Train"], ["goals", "🎯", "Goals"]].map(([t, icon, label]) => (
              <button key={t} onClick={() => setTab(t)} style={{
                flex: 1, padding: "11px 2px", background: "none", border: "none",
                borderBottom: tab === t ? `3px solid ${C.blue}` : "3px solid transparent",
                color: tab === t ? C.blue : C.textLight,
                fontWeight: 800, fontSize: 10, cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", gap: 2, transition: "color 0.2s", fontFamily: "inherit"
              }}>
                <span style={{ fontSize: 15 }}>{icon}</span>
                {label}
              </button>
            ))}
          </div>

          {/* Content */}
          <div style={{ flex: 1, padding: "16px 16px 20px" }}>

            {/* DASHBOARD TAB */}
            {tab === "dash" && (() => {
              const last7 = Array.from({length:7},(_,i)=>{ const d=new Date(); d.setDate(d.getDate()-i); return d.toISOString().split("T")[0]; }).reverse();
              const last30 = Array.from({length:30},(_,i)=>{ const d=new Date(); d.setDate(d.getDate()-i); return d.toISOString().split("T")[0]; }).reverse();

              // Nutrition stats
              const weekCalAvg = (() => {
                const days = last7.filter(d => (entries[d]||[]).length > 0);
                if (!days.length) return 0;
                return Math.round(days.reduce((a,d) => a + (entries[d]||[]).reduce((s,e)=>s+e.calories*e.qty,0), 0) / days.length);
              })();
              const weekProtAvg = (() => {
                const days = last7.filter(d => (entries[d]||[]).length > 0);
                if (!days.length) return 0;
                return Math.round(days.reduce((a,d) => a + (entries[d]||[]).reduce((s,e)=>s+e.protein*e.qty,0), 0) / days.length);
              })();
              const daysLogged = last7.filter(d => (entries[d]||[]).length > 0).length;
              const daysWorkedOut = last7.filter(d => (workouts[d]||[]).length > 0).length;

              // Weight stats
              const weightEntries = Object.entries(weightLog).filter(([,v])=>v).sort(([a],[b])=>a.localeCompare(b));
              const latestWeight = weightEntries.length ? weightEntries[weightEntries.length-1][1] : null;
              const firstWeight = weightEntries.length ? weightEntries[0][1] : null;
              const weightChange = latestWeight && firstWeight ? (parseFloat(latestWeight) - parseFloat(firstWeight)).toFixed(1) : null;

              // Workout stats
              const totalWorkouts = Object.values(workouts).flat().length;
              const totalSets = Object.values(workouts).flat().filter(w=>w.type==="lifting").reduce((a,w)=>a+w.exercises.reduce((b,e)=>b+e.sets.filter(s=>s.done).length,0),0);

              // Log weight
              const logWeight = () => {
                if (!weightEntry) return;
                setWeightLog(prev => ({ ...prev, [selectedDate]: weightEntry }));
                setWeightEntry("");
                showToast("Weight logged!");
              };

              // Mini sparkline for weight
              const recentWeights = last30.map(d => ({ date: d, val: weightLog[d] ? parseFloat(weightLog[d]) : null })).filter(x => x.val);
              const minW = recentWeights.length ? Math.min(...recentWeights.map(x=>x.val)) - 2 : 0;
              const maxW = recentWeights.length ? Math.max(...recentWeights.map(x=>x.val)) + 2 : 1;

              // Calorie bar chart last 7 days
              const maxCal = Math.max(...last7.map(d => (entries[d]||[]).reduce((s,e)=>s+e.calories*e.qty,0)), goals.calories);

              return (
                <div style={{ animation: "fadeIn 0.2s ease" }}>

                  {/* Quick action buttons */}
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8, marginBottom: 16 }}>
                    {[["➕","Log Food","add"],["💪","Workout","workout"],["🎯","Goals","goals"]].map(([icon,label,t]) => (
                      <button key={t} onClick={() => setTab(t)} style={{ padding: "12px 6px", borderRadius: 14, border: `1.5px solid ${C.border}`, background: C.card, fontWeight: 800, fontSize: 12, color: C.textMid, cursor: "pointer", fontFamily: "inherit", display: "flex", flexDirection: "column", alignItems: "center", gap: 4, boxShadow: "0 1px 4px rgba(0,0,0,0.04)" }}>
                        <span style={{ fontSize: 20 }}>{icon}</span>{label}
                      </button>
                    ))}
                  </div>

                  {/* Weight Tracker Card */}
                  <div style={{ background: C.card, borderRadius: 16, border: `1px solid ${C.border}`, padding: 16, marginBottom: 14, boxShadow: "0 1px 4px rgba(0,0,0,0.04)" }}>
                    <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 12 }}>
                      <div style={{ fontSize: 14, fontWeight: 800, color: C.text }}>⚖️ Weight Tracker</div>
                      <div style={{ display: "flex", gap: 4 }}>
                        {["lbs","kg"].map(u => (
                          <button key={u} onClick={() => setBodyWeightUnit(u)} style={{ padding: "4px 10px", borderRadius: 8, border: bodyWeightUnit===u ? `2px solid ${C.blue}` : `2px solid ${C.border}`, background: bodyWeightUnit===u ? C.blueLight : C.bg, color: bodyWeightUnit===u ? C.blue : C.textLight, fontWeight: 700, fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>{u}</button>
                        ))}
                      </div>
                    </div>

                    {/* Current weight display */}
                    <div style={{ display: "flex", gap: 10, alignItems: "center", marginBottom: 14 }}>
                      <div style={{ flex: 1 }}>
                        {latestWeight ? (
                          <div>
                            <div style={{ fontSize: 11, color: C.textLight, fontWeight: 700, textTransform: "uppercase", marginBottom: 2 }}>Current</div>
                            <div style={{ fontSize: 32, fontWeight: 900, color: C.text, lineHeight: 1 }}>{latestWeight}<span style={{ fontSize: 13, color: C.textLight, fontWeight: 600 }}> {bodyWeightUnit}</span></div>
                            {weightChange !== null && parseFloat(weightChange) !== 0 && (
                              <div style={{ fontSize: 12, fontWeight: 700, color: parseFloat(weightChange) < 0 ? C.green : C.red, marginTop: 2 }}>
                                {parseFloat(weightChange) < 0 ? "▼" : "▲"} {Math.abs(weightChange)} {bodyWeightUnit} total
                              </div>
                            )}
                          </div>
                        ) : (
                          <div style={{ fontSize: 13, color: C.textLight }}>No weight logged yet</div>
                        )}
                      </div>
                      {goals.goalWeight && (
                        <div style={{ textAlign: "right" }}>
                          <div style={{ fontSize: 11, color: C.textLight, fontWeight: 700, textTransform: "uppercase", marginBottom: 2 }}>Goal</div>
                          <div style={{ fontSize: 22, fontWeight: 800, color: C.textMid }}>{goals.goalWeight}<span style={{ fontSize: 11 }}> {bodyWeightUnit}</span></div>
                          {latestWeight && <div style={{ fontSize: 11, color: C.textLight }}>{Math.abs((parseFloat(latestWeight)-parseFloat(goals.goalWeight)).toFixed(1))} to go</div>}
                        </div>
                      )}
                    </div>

                    {/* Log today's weight */}
                    <div style={{ display: "flex", gap: 8, marginBottom: recentWeights.length > 1 ? 14 : 0 }}>
                      <input type="number" placeholder={`Enter weight (${bodyWeightUnit})`} value={weightEntry} onChange={e => setWeightEntry(e.target.value)}
                        style={{ ...inputStyle, flex: 1, padding: "10px 14px", fontSize: 15 }} />
                      <button onClick={logWeight} style={{ padding: "10px 18px", borderRadius: 12, border: "none", background: C.blue, color: "#fff", fontWeight: 800, fontSize: 14, cursor: "pointer", fontFamily: "inherit" }}>Log</button>
                    </div>

                    {/* Sparkline */}
                    {recentWeights.length > 1 && (
                      <div>
                        <div style={{ fontSize: 11, color: C.textLight, fontWeight: 700, marginBottom: 6 }}>Last 30 Days</div>
                        <svg width="100%" height="60" viewBox={`0 0 300 60`} style={{ display: "block" }}>
                          <polyline
                            points={recentWeights.map((x,i) => `${(i/(recentWeights.length-1))*290+5},${55-((x.val-minW)/(maxW-minW))*50}`).join(" ")}
                            fill="none" stroke={C.blue} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" />
                          {recentWeights.map((x,i) => (
                            <circle key={i} cx={(i/(recentWeights.length-1))*290+5} cy={55-((x.val-minW)/(maxW-minW))*50} r="3" fill={C.blue} />
                          ))}
                        </svg>
                        <div style={{ display: "flex", justifyContent: "space-between", fontSize: 10, color: C.textLight }}>
                          <span>{recentWeights[0].date.slice(5)}</span>
                          <span>{recentWeights[recentWeights.length-1].date.slice(5)}</span>
                        </div>
                      </div>
                    )}
                  </div>

                  {/* This Week Stats */}
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 14 }}>
                    {[
                      { label: "Avg Calories", value: weekCalAvg || "—", sub: "this week", color: C.blue, icon: "🔥" },
                      { label: "Avg Protein", value: weekProtAvg ? weekProtAvg+"g" : "—", sub: "this week", color: C.green, icon: "💪" },
                      { label: "Days Logged", value: `${daysLogged}/7`, sub: "this week", color: C.orange, icon: "📋" },
                      { label: "Workouts", value: `${daysWorkedOut}/7`, sub: "this week", color: C.purple, icon: "🏋️" },
                    ].map(s => (
                      <div key={s.label} style={{ background: C.card, borderRadius: 14, border: `1px solid ${C.border}`, padding: "14px 16px", boxShadow: "0 1px 4px rgba(0,0,0,0.04)" }}>
                        <div style={{ fontSize: 18, marginBottom: 4 }}>{s.icon}</div>
                        <div style={{ fontSize: 22, fontWeight: 900, color: s.color, lineHeight: 1 }}>{s.value}</div>
                        <div style={{ fontSize: 11, fontWeight: 700, color: C.textMid, marginTop: 2 }}>{s.label}</div>
                        <div style={{ fontSize: 10, color: C.textLight }}>{s.sub}</div>
                      </div>
                    ))}
                  </div>

                  {/* Calorie bar chart - last 7 days */}
                  <div style={{ background: C.card, borderRadius: 16, border: `1px solid ${C.border}`, padding: 16, marginBottom: 14, boxShadow: "0 1px 4px rgba(0,0,0,0.04)" }}>
                    <div style={{ fontSize: 13, fontWeight: 800, color: C.text, marginBottom: 14 }}>📊 Calories — Last 7 Days</div>
                    <div style={{ display: "flex", alignItems: "flex-end", gap: 6, height: 80 }}>
                      {last7.map(d => {
                        const cal = (entries[d]||[]).reduce((s,e)=>s+e.calories*e.qty,0);
                        const h = maxCal > 0 ? Math.max((cal/maxCal)*72, cal > 0 ? 4 : 0) : 0;
                        const isToday = d === todayKey();
                        const over = cal > goals.calories;
                        return (
                          <div key={d} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 4 }}>
                            {cal > 0 && <div style={{ fontSize: 8, color: C.textLight, fontWeight: 700 }}>{Math.round(cal/1000*10)/10}k</div>}
                            <div style={{ width: "100%", height: h, borderRadius: "4px 4px 0 0", background: over ? C.red : isToday ? C.blue : C.blueLight, minHeight: cal > 0 ? 4 : 0, transition: "height 0.4s ease" }} />
                            <div style={{ fontSize: 9, fontWeight: isToday ? 800 : 600, color: isToday ? C.blue : C.textLight }}>
                              {new Date(d+"T12:00:00").toLocaleDateString("en-US",{weekday:"narrow"})}
                            </div>
                          </div>
                        );
                      })}

                  "Crunch","Bicycle Crunch","Reverse Crunch","Toe Touch Crunch","V-Up","Tuck V-Up",
                  "Leg Raise","Flutter Kick","Scissor Kick","Dead Bug","Bird Dog",
                  "Mountain Climber","Sprawl","Ab Rollout","Dragon Flag","L-Sit Hold",
                  "Russian Twist","Windmill","Side Bend",
                ],
                "Bodyweight - Full Body": [
                  "Burpee","Burpee Pull Up","No Push Up Burpee","Half Burpee",
                  "Bear Crawl","Crab Walk","Inchworm","Walkout","Seal Walk",
                  "Box Jump","Broad Jump","Tuck Jump","Star Jump","Split Jump",
                  "Sprawl to Push Up","Squat to Push Up","Man Maker",
                  "Turkish Get Up","Windmill","Lateral Shuffle","High Knees","Butt Kicks",
                ],
                "Animal Flow": [
                  "Beast Hold","Beast Reach","Beast to Crab","Crab Hold","Crab Reach",
                  "Ape Hold","Ape Reach","Ape to Squat","Loaded Beast","Loaded Crab",
                  "Scorpion Reach","Front Kick Through","Side Kick Through","Under Switch",
                  "Wrist Mobilization","Traveling Beast","Traveling Crab","Traveling Ape",
                  "Forward Underswitches","Lateral Underswitches","Rotational Underswitches",
                  "Front Sweep","Back Sweep","Side Sweep",
                  "Frog Squat","Frog to Squat","Deep Squat Hold","Cossack Squat",
                  "Shoulder Roll Forward","Shoulder Roll Backward","Hip Circle","Spine Wave",
                  "Flow Combination A (Beast-Crab)","Flow Combination B (Ape-Kick Through)","Free Flow",
                ],
                "Mobility & Stretch": [
                  "Hip Flexor Stretch","Pigeon Pose","Figure Four Stretch","Butterfly Stretch",
                  "World's Greatest Stretch","Thoracic Rotation","Cat-Cow","Child's Pose",
                  "Downward Dog","Lizard Pose","Couch Stretch","Quad Stretch",
                  "90/90 Hip Stretch","Deep Squat Hold","Ankle Circles","Wrist Circles",
                ],
              };
              const CARDIO_TYPES = [
                "Running","Walking","Hiking","Cycling - Indoor","Cycling - Outdoor","Mountain Biking",
                "Indoor Rowing","Elliptical","Swimming","Jump Rope","Stair Climber",
                "HIIT","Circuit Training","Other",
              ];
              const CARDIO_ICONS = {
                "Running":"🏃","Walking":"🚶","Hiking":"🥾","Cycling - Indoor":"🚴","Cycling - Outdoor":"🚴",
                "Mountain Biking":"🚵","Indoor Rowing":"🚣","Elliptical":"⚡","Swimming":"🏊",
                "Jump Rope":"🪢","Stair Climber":"🪜","HIIT":"🔥","Circuit Training":"💪","Other":"🏅",
              };
              const allExercises = Object.values(EXERCISES).flat();

              // PR tracking — find best set per exercise across all workouts
              const allWorkoutDays = Object.values(workouts).flat();
              const prs = {};
              allWorkoutDays.forEach(w => {
                if (w.type === "lifting") {
                  w.exercises.forEach(ex => {
                    ex.sets.forEach(s => {
                      if (s.weight && s.reps) {
                        const vol = parseFloat(s.weight) * parseFloat(s.reps);
                        if (!prs[ex.name] || vol > prs[ex.name].vol) {
                          prs[ex.name] = { weight: s.weight, reps: s.reps, vol, date: w.date };
                        }
                      }
                    });
                  });
                }
              });

              const dayWorkouts = workouts[workoutDate] || [];
              const weekDays = Array.from({length:7},(_,i)=>{ const d=new Date(); d.setDate(d.getDate()-i); return d.toISOString().split("T")[0]; }).reverse();

              const saveWorkout = (w) => {
                setWorkouts(prev => {
                  const dateKey = w.date || workoutDate;
                  const day = prev[dateKey] || [];
                  const idx = day.findIndex(x => x.id === w.id);
                  const updated = idx >= 0 ? day.map((x,i) => i===idx ? w : x) : [...day, w];
                  return { ...prev, [dateKey]: updated };
                });
              };

              const deleteWorkout = (id, dateKey) => {
                const dk = dateKey || workoutDate;
                setWorkouts(prev => ({ ...prev, [dk]: (prev[dk]||[]).filter(w=>w.id!==id) }));
                if (activeWorkout?.id === id) setActiveWorkout(null);
                if (editingWorkout?.id === id) setEditingWorkout(null);
              };

              const startLifting = (routine=null) => {
                const w = {
                  id: Date.now(), type: "lifting", date: workoutDate,
                  name: routine ? routine.name : "Workout",
                  exercises: routine ? routine.exercises.map(e=>({name:e,sets:[{weight:"",reps:"",done:false}]})) : [],
                  startTime: Date.now(), endTime: null, notes: ""
                };
                setActiveWorkout(w);
                setWorkoutTab("active");
              };

              const editExistingWorkout = (w) => {
                setActiveWorkout({ ...w, editing: true });
                setWorkoutTab("active");
              };

              const addExerciseToActive = (name) => {
                const updated = { ...activeWorkout, exercises: [...activeWorkout.exercises, { name, sets: [{weight:"",reps:"",done:false}] }] };
                setActiveWorkout(updated);
                setShowExercisePicker(false);
                setExerciseSearch("");
              };

              const addSingleExercise = (name) => {
                // Find or create a workout for today
                const todayWorkouts = workouts[workoutDate] || [];
                const existing = todayWorkouts.find(w => w.type === "lifting" && !w.endTime);
                if (existing) {
                  const updated = { ...existing, exercises: [...existing.exercises, { name, sets: [{weight:"",reps:"",done:false}] }] };
                  setActiveWorkout(updated);
                } else {
                  const w = { id: Date.now(), type: "lifting", date: workoutDate, name: "Workout", exercises: [{ name, sets: [{weight:"",reps:"",done:false}] }], startTime: Date.now(), endTime: null, notes: "" };
                  setActiveWorkout(w);
                }
                setWorkoutTab("active");
                setShowExercisePicker(false);
                setExerciseSearch("");
              };

              const updateSet = (exIdx, setIdx, field, val) => {
                const exs = activeWorkout.exercises.map((ex, ei) => ei !== exIdx ? ex : {
                  ...ex, sets: ex.sets.map((s, si) => si !== setIdx ? s : { ...s, [field]: val })
                });
                setActiveWorkout({ ...activeWorkout, exercises: exs });
              };

              const addSet = (exIdx) => {
                const prev = activeWorkout.exercises[exIdx].sets;
                const last = prev[prev.length-1];
                const exs = activeWorkout.exercises.map((ex, ei) => ei !== exIdx ? ex : {
                  ...ex, sets: [...ex.sets, { weight: last.weight, reps: last.reps, done: false }]
                });
                setActiveWorkout({ ...activeWorkout, exercises: exs });
              };

              const removeSet = (exIdx, setIdx) => {
                const exs = activeWorkout.exercises.map((ex, ei) => ei !== exIdx ? ex : {
                  ...ex, sets: ex.sets.filter((_,si) => si !== setIdx)
                });
                setActiveWorkout({ ...activeWorkout, exercises: exs });
              };

              const removeExercise = (exIdx) => {
                setActiveWorkout({ ...activeWorkout, exercises: activeWorkout.exercises.filter((_,i)=>i!==exIdx) });
              };

              const renameExercise = (exIdx, newName) => {
                const exs = activeWorkout.exercises.map((ex,i) => i===exIdx ? {...ex, name: newName} : ex);
                setActiveWorkout({ ...activeWorkout, exercises: exs });
              };

              const finishWorkout = () => {
                const finished = { ...activeWorkout, endTime: activeWorkout.editing ? activeWorkout.endTime : Date.now(), editing: false };
                saveWorkout(finished);
                setActiveWorkout(null);
                setWorkoutTab("log");
                showToast(activeWorkout.editing ? "Workout updated! ✏️" : "Workout saved! 💪");
              };

              const logCardio = () => {
                if (!cardioForm.duration) return;
                if (editingCardio) {
                  const updated = { ...editingCardio, ...cardioForm };
                  saveWorkout(updated);
                  setEditingCardio(null);
                  showToast("Cardio updated!");
                } else {
                  const w = { id: Date.now(), type: "cardio", date: workoutDate, ...cardioForm };
                  setWorkouts(prev => ({ ...prev, [workoutDate]: [...(prev[workoutDate]||[]), w] }));
                  showToast("Cardio logged! 🏃");
                }
                setCardioForm({ type: "Running", duration: "", distance: "", calories: "", notes: "" });
                setShowCardioForm(false);
              };

              const saveRoutine = () => {
                if (!routineDraft.name || routineDraft.exercises.length === 0) return;
                setRoutines(prev => [...prev, { ...routineDraft, id: Date.now() }]);
                setRoutineDraft({ name: "", exercises: [] });
                setShowRoutineBuilder(false);
                showToast("Routine saved!");
              };

              const deleteRoutine = (id) => setRoutines(prev => prev.filter(r => r.id !== id));

              const inputS = { ...inputStyle, padding: "9px 12px", fontSize: 14 };

              // ACTIVE WORKOUT VIEW
              if (workoutTab === "active" && activeWorkout) {
                const elapsed = activeWorkout.editing
                  ? (activeWorkout.endTime ? Math.round((activeWorkout.endTime - activeWorkout.startTime)/60000) : "?")
                  : Math.round((Date.now() - activeWorkout.startTime) / 60000);
                const groupedEx = Object.entries(EXERCISES).map(([group, exs]) => ({
                  group, exs: exs.filter(e => e.toLowerCase().includes(exerciseSearch.toLowerCase()))
                })).filter(g => g.exs.length > 0);

                return (
                  <div style={{ animation: "fadeIn 0.2s ease" }}>
                    {/* Active workout header */}
                    <div style={{ background: C.card, borderRadius: 16, border: `1px solid ${activeWorkout.editing ? C.orange : C.border}`, padding: 16, marginBottom: 14, boxShadow: "0 1px 4px rgba(0,0,0,0.04)" }}>
                      {activeWorkout.editing && <div style={{ fontSize: 11, color: C.orange, fontWeight: 800, marginBottom: 6, textTransform: "uppercase", letterSpacing: 0.5 }}>✏️ Editing Workout</div>}
                      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
                        <input value={activeWorkout.name} onChange={e => setActiveWorkout({...activeWorkout, name: e.target.value})}
                          style={{ ...inputS, flex: 1, fontWeight: 800, fontSize: 16, border: "none", background: "transparent", padding: "0", marginRight: 10 }} />
                        <div style={{ fontSize: 12, color: C.textLight, fontWeight: 700, whiteSpace: "nowrap" }}>⏱ {elapsed}m</div>
                      </div>
                      <div style={{ display: "flex", gap: 8 }}>
                        <button onClick={finishWorkout} style={{ flex: 2, padding: "11px", borderRadius: 12, border: "none", background: activeWorkout.editing ? C.orange : C.green, color: "#fff", fontWeight: 800, fontSize: 14, cursor: "pointer", fontFamily: "inherit" }}>
                          {activeWorkout.editing ? "✓ Save Changes" : "✓ Finish Workout"}
                        </button>
                        <button onClick={() => { if (!activeWorkout.editing) saveWorkout(activeWorkout); setActiveWorkout(null); setWorkoutTab("log"); }}
                          style={{ flex: 1, padding: "11px", borderRadius: 12, border: `1.5px solid ${C.border}`, background: C.bg, color: C.textMid, fontWeight: 700, fontSize: 13, cursor: "pointer", fontFamily: "inherit" }}>
                          {activeWorkout.editing ? "Cancel" : "Save Draft"}
                        </button>
                      </div>
                    </div>

                    {/* Exercises */}
                    {activeWorkout.exercises.map((ex, exIdx) => {
                      const pr = prs[ex.name];
                      return (
                        <div key={exIdx} style={{ background: C.card, borderRadius: 16, border: `1px solid ${C.border}`, padding: 16, marginBottom: 12, boxShadow: "0 1px 4px rgba(0,0,0,0.04)" }}>
                          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10 }}>
                            <div style={{ flex: 1, marginRight: 8 }}>
                              <input value={ex.name} onChange={e => renameExercise(exIdx, e.target.value)}
                                style={{ ...inputS, border: "none", background: "transparent", padding: 0, fontWeight: 800, fontSize: 15, color: C.text, width: "100%" }} />
                              {pr && <div style={{ fontSize: 11, color: C.orange, fontWeight: 700 }}>🏆 PR: {pr.weight}lb × {pr.reps}</div>}
                            </div>
                            <button onClick={() => removeExercise(exIdx)} style={{ background: C.border, border: "none", color: C.textLight, width: 28, height: 28, borderRadius: 99, fontSize: 15, cursor: "pointer", fontFamily: "inherit", flexShrink: 0 }}>×</button>
                          </div>
                          {/* Set headers */}
                          <div style={{ display: "grid", gridTemplateColumns: "28px 1fr 1fr 36px", gap: 6, marginBottom: 6 }}>
                            {["Set","lbs","Reps",""].map((h,i) => <div key={i} style={{ fontSize: 10, fontWeight: 800, color: C.textLight, textAlign: "center", textTransform: "uppercase" }}>{h}</div>)}
                          </div>
                          {ex.sets.map((s, sIdx) => (
                            <div key={sIdx} style={{ display: "grid", gridTemplateColumns: "28px 1fr 1fr 36px", gap: 6, marginBottom: 6, alignItems: "center" }}>
                              <div style={{ fontSize: 12, fontWeight: 800, color: s.done ? C.green : C.textLight, textAlign: "center", background: s.done ? C.greenLight : C.bg, borderRadius: 8, padding: "8px 2px" }}>{sIdx+1}</div>
                              <input type="number" placeholder="135" value={s.weight} onChange={e => updateSet(exIdx,sIdx,"weight",e.target.value)}
                                style={{ ...inputS, textAlign: "center" }} />
                              <input type="number" placeholder="10" value={s.reps} onChange={e => updateSet(exIdx,sIdx,"reps",e.target.value)}
                                style={{ ...inputS, textAlign: "center" }} />
                              <button onClick={() => s.weight && s.reps ? updateSet(exIdx,sIdx,"done",!s.done) : removeSet(exIdx,sIdx)}
                                style={{ height: 36, borderRadius: 10, border: "none", background: s.done ? C.green : (s.weight&&s.reps ? C.blue : C.border), color: s.done||s.weight&&s.reps ? "#fff" : C.textLight, fontWeight: 800, fontSize: 13, cursor: "pointer", fontFamily: "inherit" }}>
                                {s.done ? "✓" : (s.weight&&s.reps ? "✓" : "×")}
                              </button>
                            </div>
                          ))}
                          <button onClick={() => addSet(exIdx)} style={{ width: "100%", padding: "8px", borderRadius: 10, border: `1.5px dashed ${C.border}`, background: "transparent", color: C.blue, fontWeight: 700, fontSize: 13, cursor: "pointer", marginTop: 4, fontFamily: "inherit" }}>
                            + Add Set
                          </button>
                        </div>
                      );
                    })}

                    {/* Add exercise */}
                    {!showExercisePicker ? (
                      <button onClick={() => setShowExercisePicker(true)} style={{ width: "100%", padding: "13px", borderRadius: 14, border: `2px dashed ${C.blue}`, background: C.blueLight, color: C.blue, fontWeight: 800, fontSize: 15, cursor: "pointer", fontFamily: "inherit", marginBottom: 12 }}>
                        + Add Exercise
                      </button>
                    ) : (
                      <div style={{ background: C.card, borderRadius: 16, border: `1px solid ${C.border}`, padding: 16, marginBottom: 12 }}>
                        <div style={{ display: "flex", gap: 8, marginBottom: 12 }}>
                          <input placeholder="Search exercises..." value={exerciseSearch} onChange={e => setExerciseSearch(e.target.value)}
                            style={{ ...inputS, flex: 1 }} autoFocus />
                          <button onClick={() => { setShowExercisePicker(false); setExerciseSearch(""); }} style={{ padding: "9px 14px", borderRadius: 10, border: `1px solid ${C.border}`, background: C.bg, color: C.textMid, fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>✕</button>
                        </div>
                        <div style={{ maxHeight: 300, overflowY: "auto" }}>
                          {groupedEx.map(({group, exs}) => (
                            <div key={group} style={{ marginBottom: 10 }}>
                              <div style={{ fontSize: 10, fontWeight: 800, color: C.textLight, textTransform: "uppercase", letterSpacing: 1, marginBottom: 6, paddingLeft: 4 }}>{group}</div>
                              {exs.map(e => (
                                <button key={e} onClick={() => addExerciseToActive(e)}
                                  style={{ display: "block", width: "100%", textAlign: "left", padding: "10px 12px", marginBottom: 4, borderRadius: 10, border: `1px solid ${C.border}`, background: C.bg, color: C.text, fontWeight: 700, fontSize: 14, cursor: "pointer", fontFamily: "inherit" }}>
                                  {e}
                                </button>
                              ))}
                            </div>
                          ))}
                        </div>
                      </div>
                    )}

                    {/* Notes */}
                    <div style={{ background: C.card, borderRadius: 14, border: `1px solid ${C.border}`, padding: 14, marginBottom: 16 }}>
                      <label style={{ fontSize: 12, color: C.textMid, fontWeight: 700, display: "block", marginBottom: 6 }}>Workout Notes</label>
                      <textarea value={activeWorkout.notes} onChange={e => setActiveWorkout({...activeWorkout, notes: e.target.value})}
                        placeholder="How did it feel? Any notes..."
                        style={{ ...inputS, width: "100%", minHeight: 70, resize: "vertical", fontFamily: "inherit" }} />
                    </div>
                  </div>
                );
              }

              // MAIN WORKOUT VIEWS
              return (
                <div style={{ animation: "fadeIn 0.2s ease" }}>
                  {/* Workout sub-tabs */}
                  <div style={{ display: "flex", background: C.border, borderRadius: 12, padding: 3, marginBottom: 16 }}>
                    {[["log","📅 Today"],["history","📊 History"],["routines","📋 Routines"],["prs","🏆 PRs"]].map(([t,label]) => (
                      <button key={t} onClick={() => setWorkoutTab(t)}
                        style={{ flex: 1, padding: "8px 4px", borderRadius: 10, fontSize: 11, fontWeight: 800, border: "none", cursor: "pointer", fontFamily: "inherit", transition: "all 0.2s",
                          background: workoutTab === t ? C.card : "transparent",
                          color: workoutTab === t ? C.blue : C.textLight,
                          boxShadow: workoutTab === t ? "0 2px 8px rgba(0,0,0,0.1)" : "none" }}>
                        {label}
                      </button>
                    ))}
                  </div>

                  {/* TODAY LOG */}
                  {workoutTab === "log" && (
                    <div>
                      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 14 }}>
                        <div style={{ fontSize: 15, fontWeight: 800, color: C.text }}>{formatDate(workoutDate)}</div>
                        <input type="date" value={workoutDate} onChange={e => setWorkoutDate(e.target.value)}
                          style={{ background: C.card, border: `1.5px solid ${C.border}`, borderRadius: 10, padding: "6px 10px", fontSize: 12, cursor: "pointer", fontFamily: "inherit", fontWeight: 600, color: C.text }} />
                      </div>

                      {/* Start buttons */}
                      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8, marginBottom: 12 }}>
                        <button onClick={() => startLifting()} style={{ padding: "14px 8px", borderRadius: 14, border: "none", background: C.blue, color: "#fff", fontWeight: 800, fontSize: 12, cursor: "pointer", fontFamily: "inherit", display: "flex", flexDirection: "column", alignItems: "center", gap: 5 }}>
                          <span style={{ fontSize: 22 }}>🏋️</span>Full Workout
                        </button>
                        <button onClick={() => { setShowExercisePicker(true); setWorkoutTab("quickadd"); }} style={{ padding: "14px 8px", borderRadius: 14, border: "none", background: C.purple, color: "#fff", fontWeight: 800, fontSize: 12, cursor: "pointer", fontFamily: "inherit", display: "flex", flexDirection: "column", alignItems: "center", gap: 5 }}>
                          <span style={{ fontSize: 22 }}>💪</span>Quick Add
                        </button>
                        <button onClick={() => setShowCardioForm(true)} style={{ padding: "14px 8px", borderRadius: 14, border: "none", background: C.green, color: "#fff", fontWeight: 800, fontSize: 12, cursor: "pointer", fontFamily: "inherit", display: "flex", flexDirection: "column", alignItems: "center", gap: 5 }}>
                          <span style={{ fontSize: 22 }}>🏃</span>Cardio
                        </button>
                      </div>

                      {/* Routine quick-start */}
                      {routines.length > 0 && (
                        <div style={{ marginBottom: 14 }}>
                          <div style={{ fontSize: 12, fontWeight: 800, color: C.textMid, textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 8 }}>Quick Start Routine</div>
                          <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                            {routines.map(r => (
                              <button key={r.id} onClick={() => startLifting(r)}
                                style={{ padding: "9px 14px", borderRadius: 10, border: `1.5px solid ${C.blue}`, background: C.blueLight, color: C.blue, fontWeight: 800, fontSize: 13, cursor: "pointer", fontFamily: "inherit" }}>
                                {r.name}
                              </button>
                            ))}
                          </div>
                        </div>
                      )}

                      {/* Cardio form */}
                      {showCardioForm && (
                        <div style={{ background: C.card, borderRadius: 16, border: `1px solid ${editingCardio ? C.orange : C.border}`, padding: 16, marginBottom: 14, boxShadow: "0 1px 4px rgba(0,0,0,0.04)" }}>
                          <div style={{ fontSize: 14, fontWeight: 800, color: C.text, marginBottom: 12 }}>{editingCardio ? "✏️ Edit Cardio" : "🏃 Log Cardio"}</div>
                          <div style={{ marginBottom: 10 }}>
                            <label style={{ fontSize: 12, color: C.textMid, fontWeight: 700, display: "block", marginBottom: 6 }}>Type</label>
                            <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                              {CARDIO_TYPES.map(t => (
                                <button key={t} onClick={() => setCardioForm(f => ({...f, type: t}))}
                                  style={{ padding: "7px 12px", borderRadius: 99, border: cardioForm.type===t ? `2px solid ${C.green}` : `2px solid ${C.border}`, background: cardioForm.type===t ? C.greenLight : C.bg, color: cardioForm.type===t ? C.green : C.textMid, fontWeight: 700, fontSize: 12, cursor: "pointer", fontFamily: "inherit" }}>
                                  {CARDIO_ICONS[t]} {t}
                                </button>
                              ))}
                            </div>
                          </div>
                          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8, marginBottom: 10 }}>
                            {[
                              {k:"duration", l:"Duration (min)", p:"30"},
                              {k:"distance", l: cardioForm.type==="Indoor Rowing" ? "Distance (m)" : "Distance (mi)", p: cardioForm.type==="Indoor Rowing" ? "2000" : "3.1"},
                              {k:"calories", l:"Calories", p:"300"},
                            ].map(f => (
                              <div key={f.k}>
                                <label style={{ fontSize: 11, color: C.textMid, fontWeight: 700, display: "block", marginBottom: 4 }}>{f.l}</label>
                                <input type="number" placeholder={f.p} value={cardioForm[f.k]} onChange={e => setCardioForm(cf => ({...cf, [f.k]: e.target.value}))} style={inputS} />
                              </div>
                            ))}
                          </div>
                          {(cardioForm.type === "Indoor Rowing") && (
                            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 10 }}>
                              <div>
                                <label style={{ fontSize: 11, color: C.textMid, fontWeight: 700, display: "block", marginBottom: 4 }}>Split (/500m)</label>
                                <input placeholder="2:00" value={cardioForm.split||""} onChange={e => setCardioForm(f=>({...f,split:e.target.value}))} style={inputS} />
                              </div>
                              <div>
                                <label style={{ fontSize: 11, color: C.textMid, fontWeight: 700, display: "block", marginBottom: 4 }}>Avg SPM</label>
                                <input type="number" placeholder="24" value={cardioForm.spm||""} onChange={e => setCardioForm(f=>({...f,spm:e.target.value}))} style={inputS} />
                              </div>
                            </div>
                          )}
                          {(cardioForm.type === "Cycling - Indoor" || cardioForm.type === "Cycling - Outdoor" || cardioForm.type === "Mountain Biking") && (
                            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 10 }}>
                              <div>
                                <label style={{ fontSize: 11, color: C.textMid, fontWeight: 700, display: "block", marginBottom: 4 }}>Avg Speed (mph)</label>
                                <input type="number" placeholder="15" value={cardioForm.speed||""} onChange={e => setCardioForm(f=>({...f,speed:e.target.value}))} style={inputS} />
                              </div>
                              <div>
                                <label style={{ fontSize: 11, color: C.textMid, fontWeight: 700, display: "block", marginBottom: 4 }}>{cardioForm.type==="Cycling - Indoor" ? "Avg Watts" : "Elevation (ft)"}</label>
                                <input type="number" placeholder={cardioForm.type==="Cycling - Indoor"?"200":"500"} value={cardioForm.extra||""} onChange={e => setCardioForm(f=>({...f,extra:e.target.value}))} style={inputS} />
                              </div>
                            </div>
                          )}

                    </div>

                    {/* Sex */}
                    <div style={{ background: C.card, borderRadius: 16, border: `1px solid ${C.border}`, padding: 16, marginBottom: 12, boxShadow: "0 1px 4px rgba(0,0,0,0.04)" }}>
                      <div style={{ fontSize: 12, fontWeight: 800, color: C.textMid, textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 10 }}>Biological Sex</div>
                      <div style={{ display: "flex", gap: 8 }}>
                        {[["male","👨 Male"], ["female","👩 Female"]].map(([v, label]) => (
                          <button key={v} onClick={() => setCalc(c => ({...c, sex: v}))}
                            style={{ flex: 1, padding: "11px", borderRadius: 12, border: calc.sex === v ? `2px solid ${C.blue}` : `2px solid ${C.border}`, background: calc.sex === v ? C.blueLight : C.bg, color: calc.sex === v ? C.blue : C.textMid, fontWeight: 800, fontSize: 14, cursor: "pointer", fontFamily: "inherit" }}>
                            {label}
                          </button>
                        ))}
                      </div>
                    </div>

                    {/* Age + Height */}
                    <div style={{ background: C.card, borderRadius: 16, border: `1px solid ${C.border}`, padding: 16, marginBottom: 12, boxShadow: "0 1px 4px rgba(0,0,0,0.04)" }}>
                      <div style={{ fontSize: 12, fontWeight: 800, color: C.textMid, textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 12 }}>Basic Info</div>
                      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 12 }}>
                        <div>
                          <label style={{ fontSize: 12, color: C.textMid, display: "block", marginBottom: 6, fontWeight: 700 }}>Age</label>
                          <input type="number" min="10" max="100" placeholder="e.g. 30" value={calc.age}
                            onChange={e => setCalc(c => ({...c, age: e.target.value}))} style={inputStyle} />
                        </div>
                        <div>
                          <label style={{ fontSize: 12, color: C.textMid, display: "block", marginBottom: 6, fontWeight: 700 }}>Unit System</label>
                          <div style={{ display: "flex", background: C.border, borderRadius: 10, overflow: "hidden" }}>
                            {[["imperial","lbs/ft"], ["metric","kg/cm"]].map(([v, label]) => (
                              <button key={v} onClick={() => setCalc(c => ({...c, unit: v}))}
                                style={{ flex: 1, padding: "11px 6px", border: "none", cursor: "pointer", fontSize: 11, fontWeight: 800, fontFamily: "inherit", transition: "all 0.15s",
                                  background: calc.unit === v ? C.blue : "transparent",
                                  color: calc.unit === v ? "#fff" : C.textMid }}>{label}</button>
                            ))}
                          </div>
                        </div>
                      </div>
                      <div>
                        <label style={{ fontSize: 12, color: C.textMid, display: "block", marginBottom: 6, fontWeight: 700 }}>Height</label>
                        {calc.unit === "imperial" ? (
                          <div style={{ display: "flex", gap: 8 }}>
                            <div style={{ flex: 1 }}>
                              <input type="number" min="3" max="8" placeholder="Feet" value={calc.heightFt}
                                onChange={e => setCalc(c => ({...c, heightFt: e.target.value}))} style={inputStyle} />
                              <div style={{ fontSize: 10, color: C.textLight, textAlign: "center", marginTop: 3, fontWeight: 600 }}>feet</div>
                            </div>
                            <div style={{ flex: 1 }}>
                              <input type="number" min="0" max="11" placeholder="Inches" value={calc.heightIn}
                                onChange={e => setCalc(c => ({...c, heightIn: e.target.value}))} style={inputStyle} />
                              <div style={{ fontSize: 10, color: C.textLight, textAlign: "center", marginTop: 3, fontWeight: 600 }}>inches</div>
                            </div>
                          </div>
                        ) : (
                          <input type="number" min="100" max="250" placeholder="e.g. 178" value={calc.heightCm}
                            onChange={e => setCalc(c => ({...c, heightCm: e.target.value}))} style={inputStyle} />
                        )}
                      </div>
                    </div>

                    {/* Current + Goal Weight */}
                    <div style={{ background: C.card, borderRadius: 16, border: `1px solid ${C.border}`, padding: 16, marginBottom: 12, boxShadow: "0 1px 4px rgba(0,0,0,0.04)" }}>
                      <div style={{ fontSize: 12, fontWeight: 800, color: C.textMid, textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 12 }}>Weight</div>
                      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                        <div>
                          <label style={{ fontSize: 12, color: C.textMid, display: "block", marginBottom: 6, fontWeight: 700 }}>Current Weight</label>
                          <input type="number" min="50" placeholder={calc.unit==="imperial" ? "lbs" : "kg"} value={calc.currentWeight}
                            onChange={e => setCalc(c => ({...c, currentWeight: e.target.value}))} style={inputStyle} />
                          <div style={{ fontSize: 10, color: C.textLight, textAlign: "center", marginTop: 3, fontWeight: 600 }}>{calc.unit === "imperial" ? "lbs" : "kg"}</div>
                        </div>
                        <div>
                          <label style={{ fontSize: 12, color: C.textMid, display: "block", marginBottom: 6, fontWeight: 700 }}>Goal Weight</label>
                          <input type="number" min="50" placeholder={calc.unit==="imperial" ? "lbs" : "kg"} value={calc.goalWeight}
                            onChange={e => setCalc(c => ({...c, goalWeight: e.target.value}))} style={inputStyle} />
                          <div style={{ fontSize: 10, color: C.textLight, textAlign: "center", marginTop: 3, fontWeight: 600 }}>{calc.unit === "imperial" ? "lbs" : "kg"}</div>
                        </div>
                      </div>
                      {calc.currentWeight && calc.goalWeight && (() => {
                        const diff = parseFloat(calc.goalWeight) - parseFloat(calc.currentWeight);
                        const unit = calc.unit === "imperial" ? "lbs" : "kg";
                        if (Math.abs(diff) < 0.5) return <div style={{ marginTop: 10, fontSize: 12, fontWeight: 700, color: C.green, textAlign: "center" }}>✓ Maintenance goal</div>;
                        return <div style={{ marginTop: 10, fontSize: 12, fontWeight: 700, color: diff < 0 ? C.blue : C.orange, textAlign: "center" }}>
                          {diff < 0 ? `📉 Lose ${Math.abs(diff).toFixed(1)} ${unit}` : `📈 Gain ${Math.abs(diff).toFixed(1)} ${unit}`}
                        </div>;
                      })()}
                    </div>

                    {/* Activity Level */}
                    <div style={{ background: C.card, borderRadius: 16, border: `1px solid ${C.border}`, padding: 16, marginBottom: 12, boxShadow: "0 1px 4px rgba(0,0,0,0.04)" }}>
                      <div style={{ fontSize: 12, fontWeight: 800, color: C.textMid, textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 12 }}>Activity Level</div>
                      {[
                        ["sedentary", "🪑 Sedentary", "Desk job, little or no exercise"],
                        ["light",    "🚶 Lightly Active", "Light exercise 1–3 days/week"],
                        ["moderate", "🏃 Moderately Active", "Moderate exercise 3–5 days/week"],
                        ["active",   "💪 Very Active", "Hard exercise 6–7 days/week"],
                        ["athlete",  "🏋️ Athlete", "Physical job or 2x training/day"],
                      ].map(([v, label, desc]) => (
                        <button key={v} onClick={() => setCalc(c => ({...c, activity: v}))}
                          style={{ display: "flex", alignItems: "center", width: "100%", padding: "11px 12px", marginBottom: 8, borderRadius: 12, cursor: "pointer", fontFamily: "inherit", textAlign: "left", transition: "all 0.15s",
                            border: calc.activity === v ? `2px solid ${C.blue}` : `2px solid ${C.border}`,
                            background: calc.activity === v ? C.blueLight : C.bg }}>
                          <div style={{ flex: 1 }}>
                            <div style={{ fontSize: 13, fontWeight: 800, color: calc.activity === v ? C.blue : C.text }}>{label}</div>
                            <div style={{ fontSize: 11, color: C.textLight, marginTop: 1 }}>{desc}</div>
                          </div>
                          {calc.activity === v && <span style={{ color: C.blue, fontSize: 18 }}>✓</span>}
                        </button>
                      ))}
                    </div>

                    {/* Body Fat (optional) */}
                    <div style={{ background: C.card, borderRadius: 16, border: `1px solid ${C.border}`, padding: 16, marginBottom: 12, boxShadow: "0 1px 4px rgba(0,0,0,0.04)" }}>
                      <div style={{ fontSize: 12, fontWeight: 800, color: C.textMid, textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 4 }}>Body Fat % <span style={{ color: C.textLight, fontWeight: 600, textTransform: "none", letterSpacing: 0 }}>(optional)</span></div>
                      <div style={{ fontSize: 11, color: C.textLight, marginBottom: 10 }}>If known, enables a more accurate calculation using lean mass.</div>
                      <input type="number" min="3" max="60" placeholder="e.g. 20" value={calc.bodyFat}
                        onChange={e => setCalc(c => ({...c, bodyFat: e.target.value}))} style={inputStyle} />
                    </div>

                    {/* Macro Split */}
                    <div style={{ background: C.card, borderRadius: 16, border: `1px solid ${C.border}`, padding: 16, marginBottom: 16, boxShadow: "0 1px 4px rgba(0,0,0,0.04)" }}>
                      <div style={{ fontSize: 12, fontWeight: 800, color: C.textMid, textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 12 }}>Macro Split</div>
                      {[
                        ["balanced",    "⚖️ Balanced",       "40% carbs · 30% protein · 30% fat", 40, 30, 30],
                        ["highprotein", "💪 High Protein",   "30% carbs · 40% protein · 30% fat", 30, 40, 30],
                        ["lowcarb",     "🥩 Low Carb",       "20% carbs · 40% protein · 40% fat", 20, 40, 40],
                        ["keto",        "🥑 Keto",           "5% carbs · 25% protein · 70% fat",  5,  25, 70],
                        ["custom",      "✏️ Custom",         "Set your own percentages",            0,  0,  0],
                      ].map(([v, label, desc]) => (
                        <button key={v} onClick={() => setCalc(c => ({...c, macroSplit: v}))}
                          style={{ display: "flex", alignItems: "center", width: "100%", padding: "11px 12px", marginBottom: 8, borderRadius: 12, cursor: "pointer", fontFamily: "inherit", textAlign: "left", transition: "all 0.15s",
                            border: calc.macroSplit === v ? `2px solid ${C.blue}` : `2px solid ${C.border}`,
                            background: calc.macroSplit === v ? C.blueLight : C.bg }}>
                          <div style={{ flex: 1 }}>
                            <div style={{ fontSize: 13, fontWeight: 800, color: calc.macroSplit === v ? C.blue : C.text }}>{label}</div>
                            <div style={{ fontSize: 11, color: C.textLight, marginTop: 1 }}>{desc}</div>
                          </div>
                          {calc.macroSplit === v && <span style={{ color: C.blue, fontSize: 18 }}>✓</span>}
                        </button>
                      ))}
                      {calc.macroSplit === "custom" && (
                        <div style={{ marginTop: 8, padding: 14, background: C.blueLight, borderRadius: 12 }}>
                          <div style={{ fontSize: 11, color: C.blue, fontWeight: 800, marginBottom: 10 }}>Custom % (must add up to 100)</div>
                          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8 }}>
                            {[{k:"customCarbs",label:"Carbs %",color:C.orange},{k:"customProtein",label:"Protein %",color:C.green},{k:"customFat",label:"Fat %",color:C.purple}].map(f => (
                              <div key={f.k}>
                                <label style={{ fontSize: 11, color: f.color, display: "block", marginBottom: 4, fontWeight: 700 }}>{f.label}</label>
                                <input type="number" min="0" max="100" placeholder="%" value={calc[f.k]||""}
                                  onChange={e => setCalc(c => ({...c, [f.k]: e.target.value}))} style={inputStyle} />
                              </div>
                            ))}
                          </div>
                          {(() => {
                            const total = (parseFloat(calc.customCarbs)||0) + (parseFloat(calc.customProtein)||0) + (parseFloat(calc.customFat)||0);
                            return <div style={{ marginTop: 8, fontSize: 12, fontWeight: 700, color: Math.abs(total-100) < 1 ? C.green : C.red, textAlign: "center" }}>Total: {total}% {Math.abs(total-100) < 1 ? "✓" : "(must = 100)"}</div>;
                          })()}
                        </div>
                      )}
                    </div>

                    {/* Calculate button & results */}
                    {(() => {
                      const canCalc = calc.age && calc.currentWeight && calc.goalWeight && calc.activity &&
                        (calc.unit === "metric" ? calc.heightCm : (calc.heightFt && calc.heightIn !== undefined));

                      if (!canCalc) return (
                        <div style={{ textAlign: "center", padding: "12px", color: C.textLight, fontSize: 13, fontWeight: 600 }}>
                          Fill in your stats above to see your results
                        </div>
                      );

                      // Convert to metric
                      const weightKg = calc.unit === "imperial" ? parseFloat(calc.currentWeight) * 0.453592 : parseFloat(calc.currentWeight);
                      const goalKg   = calc.unit === "imperial" ? parseFloat(calc.goalWeight)   * 0.453592 : parseFloat(calc.goalWeight);
                      const heightCm = calc.unit === "imperial"
                        ? (parseFloat(calc.heightFt)||0)*30.48 + (parseFloat(calc.heightIn)||0)*2.54
                        : parseFloat(calc.heightCm);
                      const age = parseFloat(calc.age);

                      // BMR — Mifflin-St Jeor or Katch-McArdle if body fat known
                      let bmr;
                      if (calc.bodyFat && parseFloat(calc.bodyFat) > 0) {
                        const lbm = weightKg * (1 - parseFloat(calc.bodyFat)/100);
                        bmr = 370 + 21.6 * lbm; // Katch-McArdle
                      } else {
                        bmr = calc.sex === "male"
                          ? 10 * weightKg + 6.25 * heightCm - 5 * age + 5
                          : 10 * weightKg + 6.25 * heightCm - 5 * age - 161;
                      }

                      const actMult = { sedentary:1.2, light:1.375, moderate:1.55, active:1.725, athlete:1.9 }[calc.activity];
                      const tdee = Math.round(bmr * actMult);

                      // Adjust for goal weight
                      const diff = goalKg - weightKg;
                      let targetCals;
                      if (Math.abs(diff) < 0.5) {
                        targetCals = tdee; // maintenance
                      } else if (diff < 0) {
                        // Lose: deficit scaled by how much to lose, capped at 1000 kcal/day
                        const deficit = Math.min(Math.abs(diff) * 110, 1000);
                        targetCals = Math.max(tdee - deficit, calc.sex === "male" ? 1500 : 1200);
                      } else {
                        // Gain: surplus, capped at 500
                        const surplus = Math.min(diff * 110, 500);
                        targetCals = tdee + surplus;
                      }
                      targetCals = Math.round(targetCals);

                      // Macro split
                      let carbPct, protPct, fatPct;
                      if (calc.macroSplit === "balanced")    { carbPct=40; protPct=30; fatPct=30; }
                      else if (calc.macroSplit === "highprotein") { carbPct=30; protPct=40; fatPct=30; }
                      else if (calc.macroSplit === "lowcarb")    { carbPct=20; protPct=40; fatPct=40; }
                      else if (calc.macroSplit === "keto")       { carbPct=5;  protPct=25; fatPct=70; }
                      else { carbPct=parseFloat(calc.customCarbs)||33; protPct=parseFloat(calc.customProtein)||34; fatPct=parseFloat(calc.customFat)||33; }

                      const protG = Math.round((targetCals * protPct/100) / 4);
                      const carbG = Math.round((targetCals * carbPct/100) / 4);
                      const fatG  = Math.round((targetCals * fatPct/100)  / 9);

                      const goalType = Math.abs(diff) < 0.5 ? "Maintenance" : diff < 0 ? "Fat Loss" : "Muscle Gain";
                      const goalColor = Math.abs(diff) < 0.5 ? C.green : diff < 0 ? C.blue : C.orange;

                      return (
                        <div>
                          {/* Result card */}
                          <div style={{ background: C.card, borderRadius: 16, border: `2px solid ${goalColor}33`, padding: 18, marginBottom: 12, boxShadow: "0 2px 12px rgba(0,0,0,0.06)" }}>
                            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 16 }}>
                              <div>
                                <div style={{ fontSize: 11, color: C.textLight, fontWeight: 700, textTransform: "uppercase", letterSpacing: 0.5 }}>Your Plan</div>
                                <div style={{ fontSize: 16, fontWeight: 900, color: goalColor }}>{goalType}</div>
                              </div>
                              <div style={{ textAlign: "right" }}>
                                <div style={{ fontSize: 11, color: C.textLight, fontWeight: 700 }}>TDEE</div>
                                <div style={{ fontSize: 14, fontWeight: 800, color: C.textMid }}>{tdee} cal/day</div>
                              </div>
                            </div>

                            {/* Big calorie number */}
                            <div style={{ textAlign: "center", marginBottom: 18, padding: "14px", background: `${goalColor}11`, borderRadius: 14 }}>
                              <div style={{ fontSize: 11, color: C.textMid, fontWeight: 700, textTransform: "uppercase", letterSpacing: 1 }}>Daily Calorie Target</div>
                              <div style={{ fontSize: 52, fontWeight: 900, color: goalColor, lineHeight: 1.1 }}>{targetCals}</div>
                              <div style={{ fontSize: 12, color: C.textLight, fontWeight: 600 }}>calories per day</div>
                            </div>

                            {/* Macro breakdown */}
                            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10, marginBottom: 16 }}>
                              {[
                                { label: "Protein", g: protG, pct: protPct, color: C.green, cal: protG*4 },
                                { label: "Carbs",   g: carbG, pct: carbPct, color: C.orange, cal: carbG*4 },
                                { label: "Fat",     g: fatG,  pct: fatPct,  color: C.purple, cal: fatG*9 },
                              ].map(m => (
                                <div key={m.label} style={{ textAlign: "center", background: C.bg, borderRadius: 12, padding: "12px 8px" }}>
                                  <div style={{ fontSize: 22, fontWeight: 900, color: m.color }}>{m.g}g</div>
                                  <div style={{ fontSize: 11, fontWeight: 800, color: C.textMid }}>{m.label}</div>
                                  <div style={{ fontSize: 10, color: C.textLight }}>{m.pct}% · {m.cal} cal</div>
                                </div>
                              ))}
                            </div>

                            {/* Weekly projection */}
                            {Math.abs(diff) >= 0.5 && (() => {
                              const dailyDiff = diff < 0 ? tdee - targetCals : targetCals - tdee;
                              const weeklyChange = calc.unit === "imperial"
                                ? ((dailyDiff * 7) / 3500).toFixed(1) + " lbs/week"
                                : ((dailyDiff * 7) / 7700).toFixed(2) + " kg/week";
                              return (
                                <div style={{ background: `${goalColor}11`, borderRadius: 10, padding: "10px 14px", display: "flex", justifyContent: "space-between" }}>
                                  <span style={{ fontSize: 12, fontWeight: 700, color: C.textMid }}>Estimated rate</span>
                                  <span style={{ fontSize: 12, fontWeight: 800, color: goalColor }}>{diff < 0 ? "−" : "+"}{weeklyChange}</span>
                                </div>
                              );
                            })()}
                          </div>

                          {/* Apply button */}
                          <button onClick={() => {
                            setGoals({ calories: targetCals, protein: protG, carbs: carbG, fat: fatG });
                            showToast("Goals updated from calculator!");
                            setGoalsSubTab("view");
                          }}
                            style={{ width: "100%", padding: "15px", borderRadius: 14, border: "none", background: goalColor, color: "#fff", fontWeight: 900, fontSize: 17, cursor: "pointer", fontFamily: "inherit", boxShadow: `0 4px 16px ${goalColor}44` }}>
                            ✓ Apply These Goals
                          </button>
                        </div>
                      );
                    })()}
                  </div>
                )}
              </div>
            )}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/sw.js");
      });
    }
  </script>
</body>
</html>
